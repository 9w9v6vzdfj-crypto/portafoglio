<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#090d16">
<title>MOI DOM 💅</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@500;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090d16;
  --bg-main:#0c111c;
  --bg-card:rgba(255,255,255,.045);
  --glass:rgba(255,255,255,.05);
  --glass-2:rgba(255,255,255,.08);
  --glass-border:rgba(255,255,255,.12);
  --input-bg:rgba(255,255,255,.05);

  --neon:#38e1d6;
  --neon2:#7c5cff;
  --neon-amber:#f5b955;
  --neon-rose:#ff5d8f;
  --neon-green:#34d399;

  --primary-dark:#38e1d6;
  --primary-light:rgba(56,225,214,.14);

  --text-main:#e9eef8;
  --text-muted:#8b96ac;
  --border-color:rgba(255,255,255,.10);

  --font-display:'Chakra Petch',sans-serif;
  --font-mono:'JetBrains Mono',monospace;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text-main);
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

/* ── SFONDO LIQUIDO ANIMATO ──────────────────────────────── */
.aurora{
  position:fixed;inset:-25%;z-index:-2;filter:blur(80px);opacity:.6;pointer-events:none;
  background:
    radial-gradient(38% 38% at 18% 28%, #1d4f73 0%, transparent 70%),
    radial-gradient(34% 34% at 82% 22%, #5a2c8f 0%, transparent 70%),
    radial-gradient(42% 42% at 65% 82%, #0e5f57 0%, transparent 70%),
    radial-gradient(30% 30% at 35% 75%, #8a2c5a 0%, transparent 72%);
  animation:auroraMove 20s ease-in-out infinite alternate;
}
@keyframes auroraMove{
  0%{transform:translate3d(-4%,-3%,0) scale(1) rotate(0deg)}
  50%{transform:translate3d(5%,3%,0) scale(1.18) rotate(4deg)}
  100%{transform:translate3d(-3%,6%,0) scale(1.06) rotate(-3deg)}
}
.grid-ovl{
  position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.4;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(circle at 50% 30%, #000 0%, transparent 80%);
  mask-image:radial-gradient(circle at 50% 30%, #000 0%, transparent 80%);
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:10px}

#app{display:flex;flex-direction:column;height:100dvh}

/* ── HEADER ──────────────────────────────────────────────── */
#header{
  background:linear-gradient(180deg, rgba(12,17,28,.85), rgba(12,17,28,.55));
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border-bottom:1px solid var(--glass-border);
  padding:calc(var(--safe-top) + 1.1rem) 1.1rem 1rem;
  flex-shrink:0;z-index:50;
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.header-title{
  font-family:var(--font-display);font-size:1.4rem;font-weight:700;letter-spacing:1px;
  color:#fff;text-shadow:0 0 18px rgba(56,225,214,.35);
}
.header-sub{font-size:.72rem;color:var(--text-muted);margin-top:.15rem;text-transform:capitalize;letter-spacing:.4px}
.header-right{display:flex;align-items:center;gap:.55rem}
.user-badge{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:2rem;padding:.32rem .8rem;font-size:.73rem;color:#fff;font-weight:600;
  font-family:var(--font-display);letter-spacing:.5px;
}
.logout-btn{
  background:transparent;border:1px solid var(--glass-border);border-radius:2rem;
  padding:.32rem .8rem;font-size:.73rem;color:var(--text-muted);cursor:pointer;transition:all .2s;
}
.logout-btn:active{background:var(--glass);transform:scale(.95)}

.tabs{display:flex;gap:.35rem;background:rgba(0,0,0,.3);padding:.28rem;border-radius:2rem;border:1px solid var(--glass-border)}
.tab-btn{
  flex:1;border:none;border-radius:2rem;padding:.52rem .2rem;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:.72rem;letter-spacing:.4px;
  transition:all .25s;background:transparent;color:var(--text-muted);
}
.tab-btn.active{
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  color:#04121a;box-shadow:0 0 18px rgba(56,225,214,.45);
}

#content{
  flex:1;overflow-y:auto;padding:1.2rem 1rem;padding-bottom:calc(var(--safe-bot) + 1.5rem);
  animation:fadeScale .36s cubic-bezier(.2,.8,.2,1);
}
@keyframes fadeScale{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}

/* ── GLASS CARDS ─────────────────────────────────────────── */
.card{
  background:var(--glass);
  backdrop-filter:blur(16px) saturate(135%);
  -webkit-backdrop-filter:blur(16px) saturate(135%);
  border:1px solid var(--glass-border);
  border-radius:1.1rem;padding:1.1rem;margin-bottom:.75rem;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 10px 30px rgba(0,0,0,.45);
  overflow-wrap:break-word;word-break:break-word;
}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}

/* ── LOGIN ───────────────────────────────────────────────── */
#login-screen{
  position:fixed;inset:0;background:rgba(9,13,22,.55);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;padding:2rem;
}
.login-box{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:1.6rem;
  padding:2.6rem 1.6rem;width:100%;max-width:360px;
  backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 25px 60px rgba(0,0,0,.6);
}
.login-title{font-family:var(--font-display);font-size:2rem;font-weight:700;color:#fff;text-align:center;margin-bottom:.3rem;text-shadow:0 0 22px rgba(56,225,214,.4);letter-spacing:1px}
.login-sub{font-size:.85rem;color:var(--text-muted);text-align:center;margin-bottom:2rem}
.login-field{margin-bottom:1.2rem}
.login-btn{
  width:100%;padding:.9rem;border:none;border-radius:2rem;
  background:linear-gradient(135deg,var(--neon),var(--neon2));color:#04121a;
  font-family:var(--font-display);font-weight:700;font-size:1rem;letter-spacing:.5px;cursor:pointer;margin-top:.5rem;
  box-shadow:0 8px 24px rgba(56,225,214,.35);transition:transform .12s;
}
.login-btn:active{transform:scale(.96)}
.login-error{color:var(--neon-rose);font-size:.83rem;text-align:center;margin-top:.75rem}

/* ── CALENDAR ────────────────────────────────────────────── */
.month-nav{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;
  background:var(--glass);padding:.5rem .8rem;border-radius:2rem;border:1px solid var(--glass-border);
}
.month-nav button{background:none;border:none;font-size:1.6rem;color:var(--neon);cursor:pointer;padding:0 .5rem}
.month-nav h3{font-family:var(--font-display);font-size:1.05rem;color:#fff;font-weight:700;letter-spacing:.5px}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:.4rem}
.cal-dow{text-align:center;font-size:.68rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-family:var(--font-display)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.3rem;margin-bottom:1rem}
.day-cell{
  border:1px solid var(--glass-border);border-radius:.75rem;padding:.5rem .1rem;cursor:pointer;
  background:rgba(255,255,255,.03);color:var(--text-main);transition:all .15s;
  min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.day-cell.other-month{background:transparent;color:#3c4660;border-color:transparent}
.day-cell.today{border-color:var(--neon);box-shadow:0 0 10px rgba(56,225,214,.25) inset}
.day-cell.selected{
  background:linear-gradient(135deg,var(--neon),var(--neon2))!important;color:#04121a!important;
  box-shadow:0 0 16px rgba(56,225,214,.45);border-color:transparent;font-weight:700;
}
.day-cell.dayoff{background:rgba(255,255,255,.02);color:#5b667e}
.day-cell.holiday{background:rgba(255,93,143,.12);color:#ff9fbb}
.day-cell.selected.dayoff,.day-cell.selected.holiday{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#04121a}
.day-cell .dc-num{font-size:1rem;font-weight:600;line-height:1;font-family:var(--font-display)}
.day-dot{width:5px;height:5px;border-radius:50%;background:var(--neon);margin:4px auto 0;box-shadow:0 0 6px var(--neon)}
.day-cell.selected .day-dot{background:#04121a;box-shadow:none}

/* ── DAY VIEW COLUMNS ────────────────────────────────────── */
.day-view-header{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;margin-bottom:.8rem}
.day-view-header h4{font-family:var(--font-display);font-size:1.05rem;color:#fff;text-transform:capitalize;font-weight:700;letter-spacing:.4px}
.columns-container{display:flex;gap:0;background:rgba(255,255,255,.02)}
.time-col{flex-shrink:0;width:46px;border-right:1px solid var(--glass-border);background:rgba(0,0,0,.18)}
.time-col-header{height:40px;border-bottom:1px solid var(--glass-border)}
.time-slot-label{height:52px;display:flex;align-items:flex-start;justify-content:center;padding-top:6px;font-size:.64rem;color:var(--text-muted);font-weight:600;border-bottom:1px solid rgba(255,255,255,.05);font-family:var(--font-mono)}
.person-col{flex:1;min-width:80px;border-right:1px solid var(--glass-border);position:relative}
.person-col:last-child{border-right:none}
.person-col-header{height:40px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;padding:0 .2rem;text-align:center;font-family:var(--font-display);letter-spacing:.3px}
.person-col-body{position:relative}
.time-row{height:52px;border-bottom:1px solid rgba(255,255,255,.05);position:relative}
.avail-block{position:absolute;left:2px;right:2px;border-radius:6px;z-index:1}
.avail-blocked{background:rgba(255,93,143,.12);border-left:3px solid var(--neon-rose)}
.appt-block{position:absolute;left:3px;right:3px;border-radius:8px;padding:4px 5px;z-index:2;cursor:pointer;overflow:hidden;color:#04121a;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.appt-block-name{font-size:.7rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.appt-block-svc{font-size:.6rem;opacity:.85;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.add-slot-btn{position:absolute;left:2px;right:2px;height:24px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1;font-size:.85rem;color:#3c4660;font-weight:500}
.time-row:hover .add-slot-btn,.add-slot-btn:active{color:var(--neon);background:rgba(56,225,214,.08);border-radius:4px}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(4,8,16,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding-bottom:var(--safe-bot);animation:overlayIn .25s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:linear-gradient(180deg, rgba(20,26,40,.92), rgba(12,17,28,.92));
  backdrop-filter:blur(26px) saturate(150%);-webkit-backdrop-filter:blur(26px) saturate(150%);
  border:1px solid var(--glass-border);border-top-color:rgba(56,225,214,.25);
  border-radius:1.5rem 1.5rem 0 0;padding:1.5rem 1.2rem;width:100%;max-width:540px;max-height:85dvh;overflow-y:auto;
  box-shadow:0 -10px 50px rgba(0,0,0,.6);animation:modalIn .3s cubic-bezier(.2,.8,.2,1);
}
@keyframes modalIn{from{opacity:0;transform:translateY(48px) scale(.96)}to{opacity:1;transform:none}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.modal-title{font-family:var(--font-display);font-size:1.25rem;color:#fff;font-weight:700;letter-spacing:.4px}
.modal-close{background:var(--glass);border:1px solid var(--glass-border);font-size:1rem;color:var(--text-muted);cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* ── FORM ────────────────────────────────────────────────── */
.field{margin-bottom:.9rem}
.field label{display:block;font-size:.74rem;color:var(--text-muted);font-weight:600;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.5px;font-family:var(--font-display)}
.field input,.field select,.field textarea,#content input,#content textarea,#content select{
  width:100%;padding:.75rem .9rem;border:1px solid var(--glass-border);border-radius:.75rem;
  background:var(--input-bg);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text-main);
  outline:none;appearance:none;transition:border-color .2s;color-scheme:dark;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(56,225,214,.12)}
.field select option{background:#0c111c;color:var(--text-main)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.info-box{background:var(--primary-light);border:1px solid rgba(56,225,214,.25);border-radius:.75rem;padding:.6rem .9rem;font-size:.85rem;color:var(--neon);margin-bottom:.9rem;font-weight:500}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{border:none;border-radius:2rem;cursor:pointer;font-family:var(--font-display);font-weight:600;letter-spacing:.3px;transition:transform .12s, box-shadow .2s;display:inline-flex;align-items:center;justify-content:center;gap:.3rem;position:relative;overflow:hidden}
.btn:active{transform:scale(.94)}
.btn-primary{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#04121a;box-shadow:0 6px 20px rgba(56,225,214,.35)}
.btn-primary::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-20deg);transition:left .5s}
.btn-primary:hover::after{left:130%}
.btn-secondary{background:var(--glass-2);color:var(--text-main);border:1px solid var(--glass-border)}
.btn-danger{background:rgba(255,93,143,.14);color:var(--neon-rose);border:1px solid rgba(255,93,143,.4)}
.btn-sm{padding:.45rem 1rem;font-size:.78rem}
.btn-md{padding:.75rem 1.4rem;font-size:.9rem}
.btn-row{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.8rem}
.icon-btn{padding:.45rem;width:32px;height:32px;border-radius:50%}

.search-bar{display:flex;gap:.5rem;align-items:center;margin-bottom:1.2rem}
.search-bar input{flex:1;padding:.7rem 1.1rem;border:1px solid var(--glass-border);border-radius:2rem;background:var(--input-bg);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text-main);outline:none;color-scheme:dark}

.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.75rem}
.service-card{background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--glass-border);border-radius:1rem;padding:1rem;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 24px rgba(0,0,0,.4)}

.badge{border-radius:2rem;padding:.2rem .65rem;font-size:.75rem;font-weight:600;display:inline-block}
.badge-rose{background:rgba(255,93,143,.16);color:var(--neon-rose)}
.badge-gold{background:rgba(245,185,85,.16);color:var(--neon-amber);border:1px solid rgba(245,185,85,.3)}

.empty{text-align:center;padding:3rem 0;color:var(--text-muted);font-style:italic}
.empty-icon{font-size:2.2rem;margin-bottom:.5rem}
.history-item{font-size:.83rem;color:var(--text-main);margin-bottom:.4rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.history-date{color:var(--neon);font-weight:700;font-family:var(--font-mono)}
.client-meta{font-size:.83rem;color:var(--text-muted);margin-top:.25rem;display:flex;flex-wrap:wrap;gap:.5rem}

/* ── BENTO STATS ─────────────────────────────────────────── */
.stats-title{font-family:var(--font-display);font-size:1rem;color:#fff;margin-bottom:1rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.year-pills{display:flex;gap:.4rem;margin-bottom:1.2rem;flex-wrap:wrap}
.year-pill{border:1px solid var(--glass-border);border-radius:2rem;padding:.4rem 1rem;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:.85rem;background:var(--glass);color:var(--text-muted);transition:all .2s}
.year-pill.active{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#04121a;box-shadow:0 0 16px rgba(56,225,214,.4);border-color:transparent}
.bento{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.bento-item{
  background:var(--glass);backdrop-filter:blur(16px) saturate(135%);-webkit-backdrop-filter:blur(16px) saturate(135%);
  border:1px solid var(--glass-border);border-radius:1.1rem;padding:1.1rem;position:relative;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 30px rgba(0,0,0,.4);
}
.bento-item.span2{grid-column:1 / -1}
.bento-item.hero{grid-column:1 / -1;padding:1.4rem 1.3rem}
.bento-item .glow-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:.7}
.stat-label{font-size:.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;font-family:var(--font-display);font-weight:600}
.stat-num{font-family:var(--font-mono);font-weight:800;line-height:1;margin-top:.4rem}
.count-num{font-family:var(--font-mono)}

.bar-track{background:rgba(255,255,255,.07);border-radius:2rem;height:7px;overflow:hidden;margin-top:.3rem}
.bar-h{height:100%;border-radius:2rem;background:linear-gradient(90deg,var(--neon),var(--neon2));transform-origin:left;animation:growH .85s cubic-bezier(.2,.8,.2,1) both;box-shadow:0 0 10px rgba(56,225,214,.4)}
@keyframes growH{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.bar-v{width:100%;border-radius:4px 4px 0 0;transform-origin:bottom;animation:growV .7s cubic-bezier(.2,.8,.2,1) both}
@keyframes growV{from{transform:scaleY(0)}to{transform:scaleY(1)}}

#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998;font-size:2.5rem;gap:.5rem}
#loader p{font-size:1rem;color:var(--neon);font-weight:500;font-family:var(--font-display);letter-spacing:1px}
</style>
</head>
<body>
<div class="aurora"></div>
<div class="grid-ovl"></div>
<div id="loader">💅<p>Caricamento…</p></div>
<div id="login-screen" style="display:none"></div>
<div id="app" style="display:none"></div>

<script>
// ── FIREBASE REST ─────────────────────────────────────────────────────────────
const FB_PROJECT="moi-dom-9e132";
const FB_API_KEY="AIzaSyAKA3Pai7x0CgPkd6AF_5OUa1DWEIv8IV8";
const FB_BASE=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

function toFS(obj){
  function cv(v){
    if(v===null||v===undefined)return{nullValue:null};
    if(typeof v==="boolean")return{booleanValue:v};
    if(typeof v==="number")return{doubleValue:v};
    if(typeof v==="string")return{stringValue:v};
    if(Array.isArray(v))return{arrayValue:{values:v.length?v.map(cv):[]}};
    if(typeof v==="object"){const f={};Object.entries(v).forEach(([k,x])=>{f[k]=cv(x)});return{mapValue:{fields:f}}}
    return{stringValue:String(v)};
  }
  const f={};Object.entries(obj).forEach(([k,v])=>{f[k]=cv(v)});return{fields:f};
}
function fromFS(fields){
  function pv(v){
    if(!v)return null;
    if(v.nullValue!==undefined)return null;
    if(v.booleanValue!==undefined)return v.booleanValue;
    if(v.doubleValue!==undefined)return v.doubleValue;
    if(v.integerValue!==undefined)return+v.integerValue;
    if(v.stringValue!==undefined)return v.stringValue;
    if(v.arrayValue)return(v.arrayValue.values||[]).map(pv);
    if(v.mapValue){const o={};Object.entries(v.mapValue.fields||{}).forEach(([k,x])=>{o[k]=pv(x)});return o}
    return null;
  }
  const o={};Object.entries(fields||{}).forEach(([k,v])=>{o[k]=pv(v)});return o;
}
async function fbGet(path){
  try{
    const r=await fetch(`${FB_BASE}/${path}?key=${FB_API_KEY}`);
    if(r.ok){const j=await r.json();return fromFS(j.fields);}
    if(r.status===404)return null;
  }catch{}return null;
}
async function fbSet(path,data){
  try{
    const mask=Object.keys(data).map(k=>"updateMask.fieldPaths="+encodeURIComponent(k)).join("&");
    const r=await fetch(`${FB_BASE}/${path}?key=${FB_API_KEY}&${mask}`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(toFS(data))
    });
    return r.ok;
  }catch{return false;}
}

function toKey(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${dd}`;}
function uid(){return"_"+Math.random().toString(36).slice(2,9);}

function italianHolidays(year){
  const fixed=[`${year}-01-01`,`${year}-01-06`,`${year}-04-25`,`${year}-05-01`,`${year}-06-02`,
    `${year}-08-15`,`${year}-11-01`,`${year}-12-08`,`${year}-12-25`,`${year}-12-26`];
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const mm=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*mm+114)/31),dy=((h+l-7*mm+114)%31)+1;
  const easter=new Date(year,mo-1,dy),easterMon=new Date(easter);easterMon.setDate(easter.getDate()+1);
  fixed.push(toKey(easter),toKey(easterMon));return new Set(fixed);
}
function dayStatus(key){
  const d=new Date(key+"T12:00:00"),dow=d.getDay();
  if(italianHolidays(d.getFullYear()).has(key))return"holiday";
  if(dow===0||dow===1)return"dayoff";
  return null;
}

// ── COUNTER ANIMATION ─────────────────────────────────────────────────────────
function animateCounters(){
  document.querySelectorAll('.count-num:not([data-done])').forEach(elm=>{
    elm.setAttribute('data-done','1');
    const to=parseFloat(elm.getAttribute('data-to'))||0;
    const prefix=elm.getAttribute('data-prefix')||'';
    const suffix=elm.getAttribute('data-suffix')||'';
    const dur=900,start=performance.now();
    function step(now){
      const t=Math.min((now-start)/dur,1);
      const e=1-Math.pow(1-t,3);
      elm.textContent=prefix+Math.round(to*e)+suffix;
      if(t<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function el(tag,props={},...children){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="class")e.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{if(c!=null)e.appendChild(typeof c==="string"?document.createTextNode(c):c)});
  return e;
}

function fld(label,tag,attrs={},children=[]){

function getMonthCells(year,month){
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  let dow=(first.getDay()+6)%7;const cells=[];
  for(let i=dow-1;i>=0;i--){const d=new Date(year,month,0-i);cells.push({date:d,cur:false});}
  for(let d=1;d<=last.getDate();d++)cells.push({date:new Date(year,month,d),cur:true});
  while(cells.length%7!==0){const p=cells[cells.length-1].date,n=new Date(p);n.setDate(p.getDate()+1);cells.push({date:n,cur:false});}
  return cells;
}

function renderDayColumns(){
  const START=8*60, END=20*60, SLOT=30;
  const slots=[];
  for(let m=START;m<END;m+=SLOT)slots.push(m);

  const order=PERSON_ORDER[state.user]||PEOPLE;
  const dayAppts=state.appointments.filter(a=>a.date===state.selectedDay);
  const dayBlocks=state.blocks.filter(b=>b.date===state.selectedDay);

  timeCol.appendChild(el("div",{class:"time-col-header"},""));
  slots.forEach(m=>{
    timeCol.appendChild(el("div",{class:"time-slot-label"},minToTime(m)));
  });
  container.appendChild(timeCol);

  order.forEach(personId=>{
    const acc=ACCOUNTS[personId];
    const col=el("div",{class:"person-col"});

    const hdr=el("div",{class:"person-col-header",style:{borderBottom:"3px solid "+acc.color,background:"rgba(255,255,255,.03)"}},
      el("span",{style:{color:acc.color,fontWeight:"700"}},PEOPLE_NAMES[personId])
    );
    col.appendChild(hdr);

    const body=el("div",{class:"person-col-body"});
    const bodyHeight=slots.length*52;
    body.style.height=bodyHeight+"px";
    body.style.position="relative";

    slots.forEach((m,i)=>{
      const row=el("div",{class:"time-row",style:{top:(i*52)+"px",position:"absolute",left:0,right:0,height:"52px"}});
      const addBtn=el("div",{class:"add-slot-btn",onClick:()=>{
        state.modal={type:"appt",data:{id:null,clientId:"",serviceId:"",personId,date:state.selectedDay,time:minToTime(m),notes:"",payment:"carta",customPrice:null}};render();
      }},"+");
      row.appendChild(addBtn);
      body.appendChild(row);
    });

    dayBlocks.filter(b=>b.personId===personId).forEach(b=>{
      let top=((b.startMin-START)/SLOT)*52;
      let height=((b.endMin-b.startMin)/SLOT)*52;
      if(top<0){ height+=top; top=0; }
      if(top>bodyHeight) return;
      if(top+height>bodyHeight) height=bodyHeight-top;
      if(height<20) height=20;
      const block=el("div",{class:"avail-block avail-blocked",style:{top:top+"px",height:(height-2)+"px"}});

          ev.stopPropagation();
          state.modal={type:"blockDetail",data:b};render();
        });
      }

    });

    dayAppts.filter(a=>a.personId===personId).forEach(a=>{
      const svc=serviceById(a.serviceId);
      const client=clientById(a.clientId);
      const startMin=timeToMin(a.time);

      const top=((startMin-START)/SLOT)*52;
      const height=((endMin-startMin)/SLOT)*52;
      if(top<0)return;
      const apptEl=el("div",{class:"appt-block",style:{
        top:top+"px",height:Math.max(height-3,22)+"px",

    }

    col.appendChild(body);
    container.appendChild(col);
  });

  return el("div",{style:{overflowX:"auto",borderRadius:"1rem",border:"1px solid var(--glass-border)",marginBottom:"1.5rem",boxShadow:"0 10px 30px rgba(0,0,0,.4)"}},container);
}

              c.birthday?el("span",{style:{background:"rgba(255,255,255,.06)",padding:".15rem .4rem",borderRadius:"4px"}},"🎂 "+new Date(c.birthday+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short"})) :txt("")
            )
          ),
          el("div",{style:{display:"flex",gap:".4rem",alignItems:"center",flexShrink:0}},
            el("span",{class:"badge",style:{background:"var(--primary-light)",color:"var(--neon)"}},appts.length+" presenze"),

            el("button",{class:"btn btn-danger btn-sm icon-btn",onClick:e=>{e.stopPropagation();if(confirm("Eliminare definitivamente "+c.name+"? Tutti i suoi appuntamenti saranno cancellati.")){

        isExp?el("div",{style:{marginTop:".9rem",borderTop:"1px solid var(--glass-border)",paddingTop:".9rem"}},
          c.notes?el("div",{style:{background:"var(--primary-light)",borderRadius:".75rem",padding:".6rem .8rem",fontSize:".85rem",color:"var(--text-main)",marginBottom:".8rem",borderLeft:"4px solid var(--neon)"}},"📝 "+c.notes):txt(""),

            future.forEach(a=>{
              const s=serviceById(a.serviceId),p=ACCOUNTS[a.personId];
              box.appendChild(el("div",{style:{background:"rgba(52,211,153,.10)",border:"1px solid rgba(52,211,153,.25)",borderRadius:".6rem",padding:".5rem .7rem",marginBottom:".3rem",display:"flex",gap:".5rem",flexWrap:"wrap",fontSize:".83rem",alignItems:"center"}},

            if(!past.length) return el("div",{style:{fontSize:".83rem",color:"var(--text-muted)",fontStyle:"italic"}},"Nessuna seduta passata a sistema");
            return el("div",{},...past.map(a=>{

                el("span",{style:{color:p?.color||"#999",fontWeight:700}},p?.name||"—"),
                el("span",{style:{flex:1}},s?.name||"—"),
                (state.user==="admin"||a.personId===state.user)?el("span",{style:{fontWeight:"700",color:"var(--neon)",fontFamily:"var(--font-mono)"}},"€"+apptPrice(a)):txt("")
              );
            }));
          })()
        ):txt("")
      );
    }))

}

// ── STATS (admin only) — BENTO GRID ───────────────────────────────────────────
function statNum(value,{prefix="",suffix="",size="1.9rem",color="var(--neon)"}={}){
  return el("div",{class:"stat-num count-num","data-to":String(value),"data-prefix":prefix,"data-suffix":suffix,
    style:{fontSize:size,color,textShadow:"0 0 16px "+(color==="var(--neon)"?"rgba(56,225,214,.4)":"transparent")}},prefix+"0"+suffix);
}

function renderStats(){
  const now=new Date(),curYear=now.getFullYear();
  const allYears=[...new Set(state.appointments.map(a=>a.date.slice(0,4)))].sort().reverse();
  if(!allYears.includes(String(curYear)))allYears.unshift(String(curYear));
  if(!state.statsYear)state.statsYear=String(curYear);
  const year=+state.statsYear;

  const liyaAppts=state.appointments.filter(a=>a.personId==="liya");

  const monthlyData=Array.from({length:12},(_,i)=>{
    const pfx=year+"-"+String(i+1).padStart(2,"0");
    const rev=liyaAppts.filter(a=>a.date.startsWith(pfx)&&a.payment!=="da_pagare").reduce((s,a)=>s+apptPrice(a),0);
    return{month:MONTHS[i].slice(0,3),rev};
  });
  const maxRev=Math.max(...monthlyData.map(m=>m.rev),1);
  const totalYear=liyaAppts.filter(a=>a.date.startsWith(String(year))&&a.payment!=="da_pagare").reduce((s,a)=>s+apptPrice(a),0);
  const curPfx=toKey(now).slice(0,7);
  const curAppts=liyaAppts.filter(a=>a.date.startsWith(curPfx));
  const curRev=curAppts.filter(a=>a.payment!=="da_pagare").reduce((s,a)=>s+apptPrice(a),0);
  const curCash=curAppts.filter(a=>a.payment==="contanti").reduce((s,a)=>s+apptPrice(a),0);
  const curCard=curAppts.filter(a=>a.payment==="carta").reduce((s,a)=>s+apptPrice(a),0);
  const curUnpaid=curAppts.filter(a=>a.payment==="da_pagare"||!a.payment).reduce((s,a)=>s+apptPrice(a),0);

  const svcCount={};
  liyaAppts.filter(a=>a.date.startsWith(String(year))).forEach(a=>{
    const s=serviceById(a.serviceId);if(!s)return;
    if(!svcCount[s.id])svcCount[s.id]={name:s.name,count:0,rev:0};
    svcCount[s.id].count++;svcCount[s.id].rev+=apptPrice(a);
  });
  const topSvcs=Object.values(svcCount).sort((a,b)=>b.count-a.count).slice(0,5);

  const dowRev=Array(7).fill(0),dowCount=Array(7).fill(0);
  liyaAppts.filter(a=>a.date.startsWith(String(year))&&a.payment!=="da_pagare").forEach(a=>{
    const dow=(new Date(a.date+"T12:00:00").getDay()+6)%7;dowRev[dow]+=apptPrice(a);dowCount[dow]++;
  });
  const bestDow=dowRev.indexOf(Math.max(...dowRev));

  const wrap=el("div",{});
  wrap.appendChild(el("div",{class:"stats-title"},"◢ Registro Economico · Liya"));

  const yr=el("div",{class:"year-pills"});
  allYears.forEach(y=>yr.appendChild(el("button",{class:"year-pill"+(String(y)===state.statsYear?" active":""),onClick:()=>{state.statsYear=String(y);render();}},String(y))));
  wrap.appendChild(yr);

  // ── BENTO GRID ──
  const bento=el("div",{class:"bento"});

  // HERO: incasso mese corrente
  bento.appendChild(el("div",{class:"bento-item hero"},
    el("div",{class:"glow-line"}),
    el("div",{class:"stat-label"},"Incasso mese corrente"),
    statNum(curRev,{prefix:"€",size:"2.6rem",color:"var(--neon)"}),
    el("div",{style:{marginTop:".6rem",display:"flex",alignItems:"flex-end",gap:"3px",height:"34px"}},
      ...monthlyData.map((m,i)=>{
        const h=maxRev>0?Math.round((m.rev/maxRev)*32)+2:2;
        const isCur=MONTHS[now.getMonth()].slice(0,3)===m.month;
        return el("div",{class:"bar-v",style:{flex:1,height:h+"px",background:isCur?"linear-gradient(180deg,var(--neon),var(--neon2))":"rgba(255,255,255,.12)",boxShadow:isCur?"0 0 10px rgba(56,225,214,.5)":"none",animationDelay:(i*0.04)+"s"}});
      })
    )
  ));

  // Trattamenti mese
  bento.appendChild(el("div",{class:"bento-item"},
    el("div",{class:"stat-label"},"Trattamenti mese"),
    statNum(curAppts.length,{size:"2rem",color:"#fff"})
  ));
  // Totale anno
  bento.appendChild(el("div",{class:"bento-item"},
    el("div",{class:"stat-label"},"Totale "+year),
    statNum(totalYear,{prefix:"€",size:"1.8rem",color:"var(--neon-amber)"})
  ));

  // Sospesi (full width, amber)
  bento.appendChild(el("div",{class:"bento-item span2",style:{borderColor:"rgba(245,185,85,.3)"}},
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      el("div",{},
        el("div",{class:"stat-label"},"⏳ Sospesi da riscuotere"),
        statNum(curUnpaid,{prefix:"€",size:"1.8rem",color:"var(--neon-amber)"})
      ),
      el("div",{style:{fontSize:"2rem",opacity:.5}},"⏳")
    )
  ));

  // Metodi di pagamento (full width)
  const payTot=curCash+curCard+curUnpaid||1;
  bento.appendChild(el("div",{class:"bento-item span2"},
    el("div",{class:"stat-label",style:{marginBottom:".6rem"}},"Metodi di pagamento · mese"),
    el("div",{style:{display:"flex",height:10,borderRadius:"2rem",overflow:"hidden",gap:2,marginBottom:".7rem"}},
      el("div",{class:"bar-h",style:{flex:Math.max(curCash,0.01),background:"linear-gradient(90deg,#10b981,#34d399)",borderRadius:"2rem",animationDelay:"0s"}}),
      el("div",{class:"bar-h",style:{flex:Math.max(curCard,0.01),background:"linear-gradient(90deg,#38e1d6,#22a3ff)",borderRadius:"2rem",animationDelay:".1s"}}),
      el("div",{class:"bar-h",style:{flex:Math.max(curUnpaid,0.01),background:"linear-gradient(90deg,#f5b955,#f59e0b)",borderRadius:"2rem",animationDelay:".2s"}})
    ),
    el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:".5rem",textAlign:"center"}},
      el("div",{},statNum(curCash,{prefix:"€",size:"1.1rem",color:"var(--neon-green)"}),el("div",{style:{fontSize:".64rem",color:"var(--text-muted)",fontWeight:600,marginTop:".2rem"}},"💵 CONTANTI")),
      el("div",{},statNum(curCard,{prefix:"€",size:"1.1rem",color:"var(--neon)"}),el("div",{style:{fontSize:".64rem",color:"var(--text-muted)",fontWeight:600,marginTop:".2rem"}},"💳 CARTA")),
      el("div",{},statNum(curUnpaid,{prefix:"€",size:"1.1rem",color:"var(--neon-amber)"}),el("div",{style:{fontSize:".64rem",color:"var(--text-muted)",fontWeight:600,marginTop:".2rem"}},"⏳ SOSPESI"))
    )
  ));
  wrap.appendChild(bento);

  // Rendimento mensile (grande grafico a barre neon)
  wrap.appendChild(el("div",{class:"bento-item span2",style:{marginBottom:".75rem"}},
    el("div",{class:"stat-label",style:{marginBottom:"1rem"}},"Rendimento mensile "+year),
    el("div",{style:{display:"flex",alignItems:"flex-end",gap:"5px",height:"110px",padding:"0 2px"}},...monthlyData.map((m,i)=>{
      const h=maxRev>0?Math.round((m.rev/maxRev)*88)+2:2;
      const isCur=MONTHS[now.getMonth()].slice(0,3)===m.month;
      return el("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"5px"}},
        el("div",{class:"bar-v",style:{width:"100%",height:h+"px",background:isCur?"linear-gradient(180deg,var(--neon),var(--neon2))":"rgba(255,255,255,.12)",boxShadow:isCur?"0 0 12px rgba(56,225,214,.5)":"none",animationDelay:(i*0.05)+"s"}}),
        el("div",{style:{fontSize:".58rem",color:"var(--text-muted)",fontWeight:600,fontFamily:"var(--font-mono)"}},m.month)
      );
    }))
  ));

  // Metodi pagamento per mese
  const monthlyPayments=Array.from({length:12},(_,i)=>{
    const pfx=year+"-"+String(i+1).padStart(2,"0");
    const ma=liyaAppts.filter(a=>a.date.startsWith(pfx));
    return{
      month:MONTHS[i].slice(0,3),
      cash:ma.filter(a=>a.payment==="contanti").reduce((s,a)=>s+apptPrice(a),0),
      card:ma.filter(a=>a.payment==="carta").reduce((s,a)=>s+apptPrice(a),0),
      unpaid:ma.filter(a=>a.payment==="da_pagare"||!a.payment).reduce((s,a)=>s+apptPrice(a),0),
    };
  });
  const payBox=el("div",{class:"bento-item span2",style:{marginBottom:".75rem"}});
  payBox.appendChild(el("div",{class:"stat-label",style:{marginBottom:".8rem"}},"Dettaglio pagamenti "+year));
  monthlyPaymentsBreakdown(monthlyPayments, year, payBox);
  wrap.appendChild(payBox);

  // Analisi giorni
  if(dowCount.some(c=>c>0)){
    const dn=["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"],mx=Math.max(...dowRev,1);
    const bb=el("div",{class:"bento-item span2",style:{marginBottom:".75rem"}});
    bb.appendChild(el("div",{class:"stat-label",style:{marginBottom:".8rem"}},"Analisi giorni lavorativi"));
    bb.appendChild(el("div",{style:{background:"var(--primary-light)",border:"1px solid rgba(56,225,214,.25)",borderRadius:".75rem",padding:".8rem",marginBottom:".8rem",textAlign:"center"}},
      el("div",{style:{fontSize:".66rem",color:"var(--text-muted)",textTransform:"uppercase",fontWeight:600,letterSpacing:".5px"}},"Miglior giorno per incassi"),
      el("div",{style:{fontSize:"1.4rem",fontWeight:700,color:"var(--neon)",fontFamily:"var(--font-display)",marginTop:"2px",textShadow:"0 0 14px rgba(56,225,214,.4)"}},dn[bestDow]),
      el("div",{style:{fontSize:".8rem",color:"var(--text-muted)",marginTop:"1px"}},"Media: €"+dowRev[bestDow]+" su "+dowCount[bestDow]+" appuntamenti")
    ));
    dn.forEach((name,i)=>{
      if(!dowCount[i])return;
      const pct=Math.round((dowRev[i]/mx)*100);
      bb.appendChild(el("div",{style:{marginBottom:".6rem"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:".8rem",marginBottom:".25rem"}},
          el("span",{style:{fontWeight:i===bestDow?700:500,color:i===bestDow?"var(--neon)":"var(--text-main)"}},name),
          el("span",{style:{color:"var(--text-muted)",fontWeight:600,fontFamily:"var(--font-mono)"}},"€"+dowRev[i])
        ),
        el("div",{class:"bar-track"},
          el("div",{class:"bar-h",style:{width:pct+"%",animationDelay:(i*0.05)+"s"}})
        )
      ));
    });
    wrap.appendChild(bb);
  }

  // Top servizi
  if(topSvcs.length>0){
    const sb=el("div",{class:"bento-item span2",style:{marginBottom:".75rem"}});
    sb.appendChild(el("div",{class:"stat-label",style:{marginBottom:".8rem"}},"🔝 Servizi più richiesti"));
    const mc=topSvcs[0].count;
    topSvcs.forEach((s,i)=>{
      const pct=Math.round((s.count/mc)*100);
      sb.appendChild(el("div",{style:{marginBottom:".75rem"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:".85rem",marginBottom:".25rem"}},
          el("span",{style:{fontWeight:600,color:"var(--text-main)"}},(i+1)+". "+s.name),
          el("span",{style:{color:"var(--text-muted)",fontWeight:600,fontFamily:"var(--font-mono)"}},s.count+" · €"+s.rev)
        ),
        el("div",{class:"bar-track"},
          el("div",{class:"bar-h",style:{width:pct+"%",animationDelay:(i*0.05)+"s"}})
        )
      ));
    });
    wrap.appendChild(sb);
  }

  // Backup
  const bk=el("div",{class:"bento-item span2"});
  bk.appendChild(el("div",{style:{fontFamily:"var(--font-display)",fontSize:"1rem",color:"#fff",fontWeight:700,marginBottom:".2rem",letterSpacing:".4px"}},"💾 Backup Manuale di Sicurezza"));
  bk.appendChild(el("div",{style:{fontSize:".8rem",color:"var(--text-muted)",marginBottom:".9rem"}},"Il database è salvato in cloud ☁️. Puoi estrarre una copia testuale per sicurezza personale."));
  bk.appendChild(el("button",{class:"btn btn-primary btn-md",style:{width:"100%",marginBottom:".6rem",borderRadius:"2rem"},onClick:()=>{
    const json=JSON.stringify({version:2,exportedAt:new Date().toISOString(),clients:state.clients,appointments:state.appointments,services:state.services,blocks:state.blocks});
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(json).then(()=>alert("✅ Copiato con successo!\n\nIncollalo in un'applicazione di note sul telefono per conservarlo.")).catch(()=>showBkText(json,bk,pasteArea));

  g.appendChild(el("div",{class:"field"},el("label",{},"Data fissata"),dateInput));
  g.appendChild(el("div",{class:"field"},el("label",{},"Orario inizio"),timeInput));
  wrap.appendChild(g);

      const ns=serviceById(serviceId);
      const nst=timeToMin(time);
      const ned=nst+Math.max(ns?.duration||60, 1);
      const conf=state.appointments.find(a=>{
        if(!a.personId||!personId)return false;
        if(a.date!==date)return false;
        if(a.personId!==personId)return false;
        if(d.id&&a.id===d.id)return false;
        const as2=serviceById(a.serviceId);
        const ast=timeToMin(a.time);
        const aed=ast+Math.max(as2?.duration||60, 1);
        return nst<aed&&ned>ast;
      });
      if(conf){
        const cc=clientById(conf.clientId);
        const confEndMin=timeToMin(conf.time)+Math.max(serviceById(conf.serviceId)?.duration||60,1);
        const ok=confirm("⚠️ Conflitto di orario!\n\nL'operatore ha già una prenotazione attiva con "+(cc?.name||"cliente")+" dalle ore "+conf.time+" alle "+minToTime(confEndMin)+".\n\nForzare l'inserimento e sovrapporre?");

      const saved={id:d.id||uid(),personId,clientId,serviceId,date,time,notes,customPrice,payment};
      if(d.id)state.appointments=state.appointments.map(a=>a.id===d.id?saved:a);
      else state.appointments.push(saved);
      saveAll();state.modal=null;render();
    }},"Salva Scheda")
  ));
  return wrap;
}

function renderBlockForm(d){

  wrap.appendChild(g);
  wrap.appendChild(el("div",{class:"field"},el("label",{},"Motivo chiusura"),noteIn));
  wrap.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn btn-secondary btn-md",style:{borderRadius:"2rem"},onClick:()=>{state.modal=null;render();}},"Annulla"),
    el("button",{class:"btn btn-danger btn-md",style:{borderRadius:"2rem"},onClick:()=>{
      let startMin=timeToMin(startIn.value),endMin=timeToMin(endIn.value);
      if(endMin<=startMin){alert("L'orario di fine blocco deve essere successivo all'inizio.");return;}
      if(startMin<8*60||endMin>20*60){
        if(!confirm("⚠️ Orario esteso! La fascia esce dai limiti standard 08-20. Adattare automaticamente?"))return;
        startMin=Math.max(startMin,8*60);
        endMin=Math.min(endMin,20*60);
        if(endMin<=startMin){alert("Adattamento fallito. Controlla gli orari.");return;}
      }
      const conflict=state.appointments.find(a=>{
        if(a.date!==d.date||a.personId!==d.personId)return false;
        const svc=serviceById(a.serviceId);
        const ast=timeToMin(a.time),aed=ast+(svc?.duration||60);
        return startMin<aed&&endMin>ast;
      });
      if(conflict){
        const cc=clientById(conflict.clientId);
        if(!confirm("⚠️ Attenzione: Risulta già un appuntamento inserito alle ore "+conflict.time+" con la cliente "+(cc?.name||"fissata")+". Bloccare comunque la fascia lasciando sovrapposizione visiva?"))return;

      }else{
        state.blocks.push({id:uid(),personId:d.personId,date:d.date,startMin,endMin,note:noteIn.value});

      saveAll();state.modal=null;render();
    }},isEdit?"✓ Applica Modifiche":"🔴 Attiva Blocco")
  ));
  return wrap;

// ── CLIENT FORM ───────────────────────────────────────────────────────────────
function renderClientForm(d){
  const form={...d};const wrap=el("div",{});
  wrap.appendChild(fld("Nominativo Cliente *","input",{type:"text",value:form.name||"",placeholder:"Nome e Cognome",onInput:e=>form.name=e.target.value}));
  wrap.appendChild(fld("Recapito Telefonico","input",{type:"tel",value:form.phone||"",placeholder:"Es. 333123456",onInput:e=>form.phone=e.target.value}));
  wrap.appendChild(fld("Indirizzo Email","input",{type:"email",value:form.email||"",placeholder:"nome@esempio.it",onInput:e=>form.email=e.target.value}));
  const bdIn=el("input",{type:"date",value:form.birthday||""});
  bdIn.addEventListener("input",e=>form.birthday=e.target.value);
  bdIn.addEventListener("change",e=>form.birthday=e.target.value);
  wrap.appendChild(el("div",{class:"field"},el("label",{},"Data di nascita"),bdIn));
  wrap.appendChild(fld("Note Storiche / Tecniche","textarea",{value:form.notes||"",rows:2,placeholder:"Es. Preferenze trattamenti, allergie, colorazioni usate...",onInput:e=>form.notes=e.target.value}));
  wrap.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn btn-secondary btn-md",style:{borderRadius:"2rem"},onClick:()=>{state.modal=null;render();}},"Annulla"),
    el("button",{class:"btn btn-primary btn-md",style:{borderRadius:"2rem"},onClick:()=>{
      if(!form.name.trim()){alert("Il nome del cliente è obbligatorio.");return;}
      if(form.id)state.clients=state.clients.map(c=>c.id===form.id?{...form}:c);
      else state.clients.push({...form,id:uid(),createdAt:toKey(new Date())});
      saveAll();state.modal=null;render();
    }},"Salva Anagrafica")
  ));
  return wrap;
}

// ── SERVICE FORM ──────────────────────────────────────────────────────────────
function renderServiceForm(d){
  const form={...d};const wrap=el("div",{});
  if(state.user==="admin"){
    const ownerSel=el("select",{});
    [["liya","💅 Reparto Estetica (Liya)"],["parrucchiera","✂️ Reparto Parrucchiera (Shared)"]].forEach(([v,l])=>{
      const o=el("option",{value:v},l);
      if(v===(form.owner||"liya"))o.selected=true;
      ownerSel.appendChild(o);
    });
    ownerSel.addEventListener("change",e=>form.owner=e.target.value);
    wrap.appendChild(el("div",{class:"field"},el("label",{},"Assegna a reparto"),ownerSel));
  } else {
    form.owner=isParrucchiera(state.user)?"parrucchiera":"liya";
  }
  wrap.appendChild(fld("Nome del servizio *","input",{type:"text",value:form.name||"",placeholder:"Es. Pulizia Viso, Piega...",onInput:e=>form.name=e.target.value}));
  const g=el("div",{class:"grid2"});
  g.appendChild(fld("Durata (minuti)","input",{type:"number",value:String(form.duration||60),min:"5",onInput:e=>form.duration=+e.target.value}));
  if(state.user==="admin"||(form.owner==="liya"&&state.user==="liya")||(form.owner==="parrucchiera"&&isParrucchiera(state.user))){
    g.appendChild(fld("Prezzo di listino (€)","input",{type:"number",value:String(form.price||0),min:"0",step:"0.5",onInput:e=>form.price=+e.target.value}));
  }
  wrap.appendChild(g);
  wrap.appendChild(fld("Breve descrizione tecnica","input",{type:"text",value:form.description||"",placeholder:"Opzionale (prodotti usati, dettagli...)",onInput:e=>form.description=e.target.value}));
  wrap.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn btn-secondary btn-md",style:{borderRadius:"2rem"},onClick:()=>{state.modal=null;render();}},"Annulla"),
    el("button",{class:"btn btn-primary btn-md",style:{borderRadius:"2rem"},onClick:()=>{
      if(!form.name.trim()){alert("Nome servizio obbligatorio.");return;}
      if(form.id)state.services=state.services.map(s=>s.id===form.id?{...form}:s);
      else state.services.push({...form,id:uid()});
      saveAll();state.modal=null;render();
    }},"Salva Servizio")
  ));
  return wrap;
}

// ── REALTIME SYNC ─────────────────────────────────────────────────────────────
let userIsTyping=false;
document.addEventListener("focusin", e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")
    userIsTyping=true;
});
document.addEventListener("focusout",()=>{ setTimeout(()=>userIsTyping=false, 300); });

async function syncFromFirebase(){
  if(!state.user) return;
  if(state.modal) return;
  if(userIsTyping) return;
  try{
    const r=await fetch(`${FB_BASE}/moidom/data?key=${FB_API_KEY}`);
    if(!r.ok) return;
    const j=await r.json();
    const d=fromFS(j.fields);
    if(d.updatedAt && d.updatedAt===lastUpdatedAt) return;
    lastUpdatedAt=d.updatedAt||"";
    state.appointments=d.appointments||[];
    state.clients=d.clients||[];
    state.services=d.services||[...DEFAULT_SERVICES];
    state.blocks=d.blocks||[];
    render();
    showSyncToast();
  }catch{}
}

function showSyncToast(){
  let t=document.getElementById("sync-toast");
  if(!t){
    t=el("div",{id:"sync-toast",style:{
      position:"fixed",bottom:"calc(var(--safe-bot) + 1.5rem)",left:"50%",transform:"translateX(-50%)",
      background:"linear-gradient(135deg,var(--neon),var(--neon2))",color:"#04121a",padding:".5rem 1.2rem",borderRadius:"2rem",
      fontSize:".75rem",fontWeight:700,zIndex:"500",boxShadow:"0 4px 20px rgba(56,225,214,.5)",fontFamily:"var(--font-display)",
      opacity:"0",transition:"opacity .3s",pointerEvents:"none"
    }},"🔄 Database Cloud Sincronizzato");
    document.body.appendChild(t);
  }
  t.style.opacity="1";
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity="0";},2200);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded",async()=>{
  await loadAll();
  document.getElementById("loader").style.display="none";
  const savedUser=LOCAL.get("ba_session",null);
  if(savedUser&&ACCOUNTS[savedUser]){
    state.user=savedUser;
    document.getElementById("app").style.display="flex";
    render();
  }else{
    renderLogin();
  }
  setInterval(syncFromFirebase, 15000);
});
</script>
