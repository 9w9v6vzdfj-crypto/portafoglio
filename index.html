<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>html{height:100%;overflow:hidden}body{height:100%;overflow:hidden;position:fixed;width:100%}</style>
<title>Portafoglio</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0c0c14;display:flex;justify-content:center;height:100%;overflow:hidden}
#root{width:100%;max-width:480px;height:100%}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}
input:focus{border-color:#5B8BF5!important}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4)}
.icon-btn{background:none;border:none;cursor:pointer;color:#444;font-size:15px;padding:4px 5px;border-radius:6px;transition:all .15s}
.icon-btn:hover{color:#5B8BF5;background:#5B8BF518}
.icon-btn.del:hover{color:#F4736E!important;background:#F4736E18!important}
.icon-btn.sm{font-size:13px}
.btn-primary{flex:1;background:linear-gradient(135deg,#5B8BF5,#2FC9A0);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:none;border:1px solid #2a2a3e;color:#777;border-radius:10px;padding:13px 18px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-ghost:hover{border-color:#444;color:#bbb}
.outline-btn{background:none;border:1px dashed #2a2a3e;color:#555;border-radius:10px;padding:12px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.outline-btn:hover{border-color:#5B8BF5;color:#5B8BF5}
.cat-pick{border:1px solid;border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;background:transparent}
.chip-btn{margin-top:6px;background:#5B8BF518;color:#5B8BF5;border:1px solid #5B8BF533;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;width:100%}
.chip-btn:hover{background:#5B8BF530}
.link-btn{background:none;border:none;cursor:pointer;font-family:inherit}
.tab-btn:hover{opacity:.8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const ls = {
  get: (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
};

const uid = () => Math.random().toString(36).slice(2,9);
const todayStr = () => new Date().toISOString().split("T")[0];
const fmt = (n) => new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(n||0);
const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const NOW = new Date();
const CY = NOW.getFullYear();
const CM = NOW.getMonth();
const pad = (n) => String(n).padStart(2,"0");

const PAYMENT_METHODS = [
  {id:"card",label:"Carta",icon:"💳"},
  {id:"cash",label:"Contanti",icon:"💵"},
  {id:"bank",label:"Bonifico",icon:"🏦"},
];
const PALETTE = ["#5B8BF5","#2FC9A0","#F4736E","#A07DF6","#F5A623","#50C8E8","#E87E50","#7EC850"];
const ICONS = ["🔄","🧾","🛒","🎉","📦","🏠","🚗","💊","✈️","👗","🎮","📚","💡","🐾","🍕","💪"];

const SEED_CATS = [
  {id:"c1",name:"Abbonamenti",icon:"🔄",color:"#5B8BF5"},
  {id:"c2",name:"Bollette",icon:"🧾",color:"#F5A623"},
  {id:"c3",name:"Cibo",icon:"🛒",color:"#2FC9A0"},
  {id:"c4",name:"Svago",icon:"🎉",color:"#F4736E"},
  {id:"c5",name:"Altro",icon:"📦",color:"#A07DF6"},
];
const SEED_RECUR = [
  {id:"r1",catId:"c1",name:"Netflix",amount:15.99,day:7},
  {id:"r2",catId:"c1",name:"Amazon Prime",amount:4.99,day:12},
];
const SEED_BILLS = [
  {id:"b1",catId:"c2",name:"Luce",day:20},
  {id:"b2",catId:"c2",name:"Gas",day:20},
  {id:"b3",catId:"c2",name:"Acqua",day:15},
];
const SEED_EXP = [
  {id:"e1",catId:"c1",name:"Netflix",amount:15.99,date:`${CY}-${pad(CM+1)}-07`,rid:"r1",bid:null,pay:"card"},
  {id:"e2",catId:"c1",name:"Amazon Prime",amount:4.99,date:`${CY}-${pad(CM+1)}-12`,rid:"r2",bid:null,pay:"card"},
  {id:"e3",catId:"c2",name:"Luce",amount:78.40,date:`${CY}-${pad(CM+1)}-20`,rid:null,bid:"b1",pay:"bank"},
  {id:"e4",catId:"c3",name:"Esselunga",amount:73.40,date:`${CY}-${pad(CM+1)}-14`,rid:null,bid:null,pay:"card"},
  {id:"e5",catId:"c4",name:"Ristorante",amount:48.00,date:`${CY}-${pad(CM+1)}-18`,rid:null,bid:null,pay:"cash"},
  {id:"e6",catId:"c3",name:"Mercato",amount:22.00,date:`${CY}-${pad(CM+1)}-10`,rid:null,bid:null,pay:"cash"},
];

const R = {
  root:{display:"flex",flexDirection:"column",height:"100%",background:"#0c0c14",color:"#d0d0e0",fontFamily:"'DM Sans','Segoe UI',sans-serif",maxWidth:480,margin:"0 auto",position:"relative",overflow:"hidden"},
  screen:{flex:1,overflowY:"auto",overflowX:"hidden"},
  page:{padding:"24px 20px 16px"},
  header:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22},
  headerSub:{fontSize:12,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:3},
  headerTitle:{fontSize:24,fontWeight:800,color:"#e8e8f0",letterSpacing:-.5},
  plusBtn:{width:42,height:42,borderRadius:12,background:"#5B8BF522",border:"none",fontSize:22,color:"#5B8BF5",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},
  totalCard:{background:"linear-gradient(135deg,#5B8BF5,#2FC9A0)",borderRadius:20,padding:"24px 22px",marginBottom:24,boxShadow:"0 8px 32px #5B8BF530"},
  totalLabel:{fontSize:12,color:"rgba(255,255,255,.7)",letterSpacing:1,textTransform:"uppercase",marginBottom:6},
  totalAmt:{fontSize:40,fontWeight:800,color:"#fff",letterSpacing:-1,marginBottom:4},
  totalSub:{fontSize:13,color:"rgba(255,255,255,.7)"},
  sectionTitle:{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#444",marginBottom:12},
  sectionTitle2:{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#444",marginBottom:16},
  catRow:{display:"flex",alignItems:"center",gap:12,marginBottom:14},
  catIcon:{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18},
  catName:{fontSize:13,color:"#b0b0c8",fontWeight:500},
  catAmt:{fontSize:14,fontWeight:700},
  barBg:{height:5,background:"#1a1a2c",borderRadius:3,overflow:"hidden"},
  barFill:{height:"100%",borderRadius:3,transition:"width .5s"},
  expRow:{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:"1px solid #13131e"},
  seeAll:{display:"block",textAlign:"center",width:"100%",marginTop:14,fontSize:13,color:"#5B8BF5",background:"none",border:"none",cursor:"pointer",padding:8},
  chip:{flexShrink:0,background:"#10101a",border:"1px solid #2a2a3e",borderRadius:14,padding:"12px 14px",display:"flex",flexDirection:"column",alignItems:"flex-start",minWidth:120,gap:2},
  settingRow:{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:"1px solid #13131e"},
  bottomNav:{display:"flex",background:"#10101a",borderTop:"1px solid #1a1a2c",padding:"8px 0 10px",flexShrink:0},
  tabBtn:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"4px 0"},
  statsCard:{background:"#10101a",border:"1px solid #1a1a2c",borderRadius:16,padding:"18px 16px",marginBottom:14},
  overlay:{position:"absolute",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"flex-end",zIndex:50,backdropFilter:"blur(4px)"},
  sheetBox:{background:"#13131e",borderRadius:"20px 20px 0 0",padding:"14px 20px 28px",width:"100%",maxHeight:"90%",overflowY:"auto",border:"1px solid #1a1a2c"},
  sheetHandle:{width:40,height:4,background:"#2a2a3e",borderRadius:2,margin:"0 auto 20px"},
  sheetTitle:{fontSize:18,fontWeight:800,color:"#e8e8f0",marginBottom:20},
  sheetBtns:{display:"flex",gap:10,marginTop:20},
  inp:{width:"100%",background:"#0c0c14",border:"1px solid #2a2a3e",borderRadius:10,padding:"12px 13px",color:"#e0e0ee",fontSize:14,fontFamily:"inherit",outline:"none"},
};

const Field = ({label,children}) => (
  <div style={{marginBottom:16}}>
    <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:"#555",marginBottom:7}}>{label}</div>
    {children}
  </div>
);
const Empty = ({msg}) => (
  <div style={{textAlign:"center",padding:"28px 0",color:"#444",fontSize:13}}>{msg}</div>
);

function ExpRow({e,cat,onEdit,onDel}){
  const pm = PAYMENT_METHODS.find(p=>p.id===e.pay);
  return (
    <div style={R.expRow}>
      <div style={{...R.catIcon,background:cat.color+"22",color:cat.color,flexShrink:0}}>{cat.icon}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,color:"#d0d0e8",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name}</div>
        <div style={{fontSize:11,color:"#555",display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
          {new Date(e.date).toLocaleDateString("it-IT",{day:"2-digit",month:"short"})}
          {" · "}<span style={{color:cat.color}}>{cat.name}</span>
          {pm && <span style={{background:"#1a1a2c",borderRadius:4,padding:"1px 5px"}}>{pm.icon} {pm.label}</span>}
          {e.rid && <span style={{fontSize:10,color:"#5B8BF5"}}>🔄</span>}
          {e.bid && <span style={{fontSize:10,color:"#F5A623"}}>🧾</span>}
        </div>
      </div>
      <div style={{fontSize:15,fontWeight:700,color:"#d0d0e8",marginRight:4}}>{fmt(e.amount)}</div>
      <button className="icon-btn sm" onClick={onEdit}>✏️</button>
      <button className="icon-btn sm del" onClick={onDel}>🗑️</button>
    </div>
  );
}

function CalendarView({monthExps,cat,selectedDay,setSelectedDay,onEdit,onDel}){
  const daysInMonth = new Date(CY,CM+1,0).getDate();
  const offset = (new Date(CY,CM,1).getDay()+6)%7;
  const byDay = {};
  monthExps.forEach(e=>{
    const d=new Date(e.date).getDate();
    if(!byDay[d])byDay[d]=[];
    byDay[d].push(e);
  });
  const dayExps = selectedDay?(byDay[selectedDay]||[]):[];
  const dayTotal = dayExps.reduce((s,e)=>s+e.amount,0);
  const todayNum = NOW.getMonth()===CM&&NOW.getFullYear()===CY?NOW.getDate():null;
  const DAYS=["L","M","M","G","V","S","D"];
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
        {DAYS.map((d,i)=>(
          <div key={i} style={{textAlign:"center",fontSize:11,color:"#444",padding:"4px 0",letterSpacing:1}}>{d}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:20}}>
        {Array.from({length:offset}).map((_,i)=><div key={"e"+i}/>)}
        {Array.from({length:daysInMonth}).map((_,i)=>{
          const day=i+1;
          const hasExps=byDay[day]&&byDay[day].length>0;
          const isSel=selectedDay===day;
          const isToday=todayNum===day;
          const dots=byDay[day]?[...new Set(byDay[day].map(e=>cat(e.catId).color))].slice(0,3):[];
          return (
            <button key={day} onClick={()=>setSelectedDay(isSel?null:day)}
              style={{aspectRatio:"1",borderRadius:10,
                border:isSel?"1px solid #5B8BF5":isToday?"1px solid #2a2a3e":"1px solid transparent",
                background:isSel?"#5B8BF522":hasExps?"#10101a":"transparent",
                cursor:hasExps||isToday?"pointer":"default",
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:2,transition:"all .15s"}}>
              <span style={{fontSize:13,fontWeight:isToday?700:400,color:isSel?"#5B8BF5":isToday?"#e8e8f0":"#666"}}>{day}</span>
              {dots.length>0&&(
                <div style={{display:"flex",gap:2}}>
                  {dots.map((col,ci)=><div key={ci} style={{width:4,height:4,borderRadius:"50%",background:col}}/>)}
                </div>
              )}
            </button>
          );
        })}
      </div>
      {selectedDay?(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={R.sectionTitle}>{selectedDay} {MONTHS[CM].slice(0,3)}</div>
            {dayExps.length>0&&<div style={{fontSize:13,fontWeight:700,color:"#5B8BF5"}}>{fmt(dayTotal)}</div>}
          </div>
          {dayExps.length===0
            ?<Empty msg="Nessuna spesa in questo giorno"/>
            :dayExps.map(e=><ExpRow key={e.id} e={e} cat={cat(e.catId)} onEdit={()=>onEdit(e)} onDel={()=>onDel(e.id)}/>)
          }
        </div>
      ):(
        <Empty msg="Tocca un giorno per vedere le spese"/>
      )}
    </div>
  );
}

function ExpForm({cats,data,onSave,onClose}){
  const [f,setF]=useState(data||{catId:cats[0]?.id||"",name:"",amount:"",date:todayStr(),rid:null,bid:null,pay:"card"});
  const ok=f.name.trim()&&+f.amount>0&&f.catId;
  return (
    <>
      <div style={R.sheetTitle}>{data&&data.id?"Modifica spesa":"Nuova spesa"}</div>
      <Field label="Descrizione">
        <input style={R.inp} placeholder="Es. Esselunga" value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))}/>
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Importo €">
          <input style={R.inp} type="number" min="0" step="0.01" placeholder="0.00" value={f.amount} onChange={e=>setF(p=>({...p,amount:e.target.value}))}/>
        </Field>
        <Field label="Data">
          <input style={R.inp} type="date" value={f.date} onChange={e=>setF(p=>({...p,date:e.target.value}))}/>
        </Field>
      </div>
      <Field label="Pagamento">
        <div style={{display:"flex",gap:8}}>
          {PAYMENT_METHODS.map(pm=>(
            <button key={pm.id} onClick={()=>setF(p=>({...p,pay:pm.id}))}
              style={{flex:1,padding:"10px 8px",borderRadius:10,
                border:f.pay===pm.id?"1px solid #5B8BF5":"1px solid #2a2a3e",
                background:f.pay===pm.id?"#5B8BF522":"transparent",
                color:f.pay===pm.id?"#5B8BF5":"#666",
                cursor:"pointer",fontFamily:"inherit",fontSize:13,
                display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:20}}>{pm.icon}</span>
              <span>{pm.label}</span>
            </button>
          ))}
        </div>
      </Field>
      <Field label="Categoria">
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {cats.map(c=>(
            <button key={c.id} className="cat-pick"
              style={{borderColor:f.catId===c.id?c.color:"#2a2a3e",background:f.catId===c.id?c.color+"22":"transparent",color:f.catId===c.id?c.color:"#666"}}
              onClick={()=>setF(p=>({...p,catId:c.id}))}>
              {c.icon} {c.name}
            </button>
          ))}
        </div>
      </Field>
      <div style={R.sheetBtns}>
        <button className="btn-primary" disabled={!ok} onClick={()=>ok&&onSave({...f,amount:+f.amount})}>{data&&data.id?"Salva":"Aggiungi"}</button>
        <button className="btn-ghost" onClick={onClose}>Annulla</button>
      </div>
    </>
  );
}

function App(){
  const [cats,setCats]=useState(()=>ls.get("pf_cats",SEED_CATS));
  const [recur,setRecur]=useState(()=>ls.get("pf_recur",SEED_RECUR));
  const [bills,setBills]=useState(()=>ls.get("pf_bills",SEED_BILLS));
  const [exps,setExps]=useState(()=>ls.get("pf_exps",SEED_EXP));
  const [tab,setTab]=useState("home");
  const [sheet,setSheet]=useState(null);
  const [expView,setExpView]=useState("list");
  const [selectedDay,setSelectedDay]=useState(null);

  useEffect(()=>ls.set("pf_cats",cats),[cats]);
  useEffect(()=>ls.set("pf_recur",recur),[recur]);
  useEffect(()=>ls.set("pf_bills",bills),[bills]);
  useEffect(()=>ls.set("pf_exps",exps),[exps]);

  const cat=(id)=>cats.find(c=>c.id===id)||{name:"?",icon:"📦",color:"#888"};

  const monthExps=useMemo(()=>
    exps.filter(e=>{const d=new Date(e.date);return d.getMonth()===CM&&d.getFullYear()===CY;})
      .sort((a,b)=>new Date(b.date)-new Date(a.date)),[exps]);

  const totalMonth=useMemo(()=>monthExps.reduce((s,e)=>s+e.amount,0),[monthExps]);
  const totalRecur=useMemo(()=>recur.reduce((s,r)=>s+r.amount,0),[recur]);

  const byCat=useMemo(()=>{
    const map={};
    monthExps.forEach(e=>{map[e.catId]=(map[e.catId]||0)+e.amount;});
    return cats.map(c=>({...c,total:map[c.id]||0})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  },[monthExps,cats]);

  const saveExp=(data)=>{
    if(data.id)setExps(p=>p.map(e=>e.id===data.id?data:e));
    else setExps(p=>[...p,{...data,id:uid()}]);
    setSheet(null);
  };
  const delExp=(id)=>setExps(p=>p.filter(e=>e.id!==id));

  const saveRecur=(data)=>{
    if(data.id)setRecur(p=>p.map(r=>r.id===data.id?data:r));
    else setRecur(p=>[...p,{...data,id:uid()}]);
    setSheet(null);
  };
  const delRecur=(id)=>{setRecur(p=>p.filter(r=>r.id!==id));setExps(p=>p.map(e=>e.rid===id?{...e,rid:null}:e));};
  const registerRecur=(r)=>setExps(p=>[...p,{id:uid(),catId:r.catId,name:r.name,amount:r.amount,date:todayStr(),rid:r.id,bid:null,pay:"card"}]);

  const saveBill=(data)=>{
    if(data.id)setBills(p=>p.map(b=>b.id===data.id?data:b));
    else setBills(p=>[...p,{...data,id:uid()}]);
    setSheet(null);
  };
  const delBill=(id)=>{setBills(p=>p.filter(b=>b.id!==id));setExps(p=>p.map(e=>e.bid===id?{...e,bid:null}:e));};
  const registerBill=(b)=>setSheet({type:"exp",data:{catId:b.catId,name:b.name,amount:"",date:todayStr(),rid:null,bid:b.id,pay:"bank"}});

  const saveCat=(data)=>{
    if(data.id)setCats(p=>p.map(c=>c.id===data.id?data:c));
    else setCats(p=>[...p,{...data,id:uid()}]);
    setSheet(null);
  };
  const delCat=(id)=>{
    setCats(p=>p.filter(c=>c.id!==id));
    setExps(p=>p.filter(e=>e.catId!==id));
    setRecur(p=>p.filter(r=>r.catId!==id));
    setBills(p=>p.filter(b=>b.catId!==id));
  };

  const isRecurDone=(rid)=>exps.some(e=>e.rid===rid&&new Date(e.date).getMonth()===CM&&new Date(e.date).getFullYear()===CY);
  const isBillDone=(bid)=>exps.some(e=>e.bid===bid&&new Date(e.date).getMonth()===CM&&new Date(e.date).getFullYear()===CY);
  const lastBillAmt=(bid)=>{const f=[...exps].filter(e=>e.bid===bid).sort((a,z)=>new Date(z.date)-new Date(a.date))[0];return f?f.amount:null;};

  return (
    <div style={R.root}>
      <div style={R.screen}>

        {tab==="home"&&(
          <div style={R.page}>
            <div style={R.header}>
              <div>
                <div style={R.headerSub}>Riepilogo</div>
                <div style={R.headerTitle}>{MONTHS[CM]} {CY}</div>
              </div>
              <button className="icon-btn" style={R.plusBtn} onClick={()=>setSheet({type:"exp"})}>＋</button>
            </div>
            <div style={R.totalCard}>
              <div style={R.totalLabel}>Speso questo mese</div>
              <div style={R.totalAmt}>{fmt(totalMonth)}</div>
              <div style={R.totalSub}>🔄 abbonamenti <strong>{fmt(totalRecur)}</strong> · <strong>{monthExps.length}</strong> transazioni</div>
            </div>
            <div style={R.sectionTitle}>Per categoria</div>
            {byCat.length===0&&<Empty msg="Nessuna spesa questo mese"/>}
            {byCat.map(c=>(
              <div key={c.id} style={R.catRow}>
                <div style={{...R.catIcon,background:c.color+"22",color:c.color}}>{c.icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={R.catName}>{c.name}</span>
                    <span style={{...R.catAmt,color:c.color}}>{fmt(c.total)}</span>
                  </div>
                  <div style={R.barBg}><div style={{...R.barFill,width:`${(c.total/totalMonth)*100}%`,background:c.color}}/></div>
                </div>
              </div>
            ))}
            <div style={{...R.sectionTitle,marginTop:24}}>Ultime spese</div>
            {monthExps.slice(0,5).map(e=>(
              <ExpRow key={e.id} e={e} cat={cat(e.catId)} onEdit={()=>setSheet({type:"exp",data:e})} onDel={()=>delExp(e.id)}/>
            ))}
            {monthExps.length>5&&(
              <button className="link-btn" style={R.seeAll} onClick={()=>setTab("expenses")}>
                Vedi tutte le {monthExps.length} spese →
              </button>
            )}
          </div>
        )}

        {tab==="expenses"&&(
          <div style={R.page}>
            <div style={R.header}>
              <div>
                <div style={R.headerSub}>Tutte le spese</div>
                <div style={R.headerTitle}>{MONTHS[CM]}</div>
              </div>
              <button className="icon-btn" style={R.plusBtn} onClick={()=>setSheet({type:"exp"})}>＋</button>
            </div>
            <div style={{display:"flex",background:"#10101a",borderRadius:10,padding:3,marginBottom:18,border:"1px solid #1a1a2c"}}>
              {[["list","📋 Lista"],["calendar","📅 Calendario"]].map(([v,label])=>(
                <button key={v} onClick={()=>setExpView(v)}
                  style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,transition:"all .15s",
                    background:expView===v?"linear-gradient(135deg,#5B8BF5,#2FC9A0)":"transparent",
                    color:expView===v?"#fff":"#555"}}>
                  {label}
                </button>
              ))}
            </div>
            {expView==="calendar"?(
              <CalendarView monthExps={monthExps} cat={cat} selectedDay={selectedDay} setSelectedDay={setSelectedDay}
                onEdit={(e)=>setSheet({type:"exp",data:e})} onDel={delExp}/>
            ):(
              <>
                <div style={R.sectionTitle}>🔄 Abbonamenti</div>
                <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4,marginBottom:16}}>
                  {recur.map(r=>{
                    const c=cat(r.catId);const done=isRecurDone(r.id);
                    return (
                      <div key={r.id} style={{...R.chip,borderColor:c.color+"55",opacity:done?.5:1}}>
                        <div style={{fontSize:18,marginBottom:2}}>{c.icon}</div>
                        <div style={{fontSize:12,fontWeight:600,color:"#e0e0ee",marginBottom:1}}>{r.name}</div>
                        <div style={{fontSize:12,color:c.color,fontWeight:700}}>{fmt(r.amount)}</div>
                        {done?<div style={{fontSize:10,color:"#444",marginTop:4}}>✓ registrato</div>
                          :<button className="chip-btn" onClick={()=>registerRecur(r)}>✅ Registra</button>}
                      </div>
                    );
                  })}
                  <div style={{...R.chip,borderStyle:"dashed",borderColor:"#2a2a3e",cursor:"pointer",alignItems:"center",justifyContent:"center"}} onClick={()=>setSheet({type:"recur"})}>
                    <div style={{fontSize:22,color:"#333"}}>＋</div><div style={{fontSize:11,color:"#444"}}>Nuovo</div>
                  </div>
                </div>
                <div style={R.sectionTitle}>🧾 Bollette</div>
                <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4,marginBottom:16}}>
                  {bills.map(b=>{
                    const c=cat(b.catId);const done=isBillDone(b.id);const last=lastBillAmt(b.id);
                    return (
                      <div key={b.id} style={{...R.chip,borderColor:c.color+"55",opacity:done?.5:1}}>
                        <div style={{fontSize:18,marginBottom:2}}>{c.icon}</div>
                        <div style={{fontSize:12,fontWeight:600,color:"#e0e0ee",marginBottom:1}}>{b.name}</div>
                        <div style={{fontSize:11,color:"#666"}}>ogni {b.day}°</div>
                        {last!==null&&<div style={{fontSize:11,color:c.color}}>ultima: {fmt(last)}</div>}
                        {done?<div style={{fontSize:10,color:"#444",marginTop:4}}>✓ registrata</div>
                          :<button className="chip-btn" style={{background:c.color+"18",color:c.color,borderColor:c.color+"33"}} onClick={()=>registerBill(b)}>✏️ Inserisci</button>}
                      </div>
                    );
                  })}
                  <div style={{...R.chip,borderStyle:"dashed",borderColor:"#2a2a3e",cursor:"pointer",alignItems:"center",justifyContent:"center"}} onClick={()=>setSheet({type:"bill"})}>
                    <div style={{fontSize:22,color:"#333"}}>＋</div><div style={{fontSize:11,color:"#444"}}>Nuova</div>
                  </div>
                </div>
                <div style={R.sectionTitle}>Spese manuali</div>
                {monthExps.filter(e=>!e.rid&&!e.bid).length===0&&<Empty msg="Nessuna spesa manuale"/>}
                {monthExps.filter(e=>!e.rid&&!e.bid).map(e=>(
                  <ExpRow key={e.id} e={e} cat={cat(e.catId)} onEdit={()=>setSheet({type:"exp",data:e})} onDel={()=>delExp(e.id)}/>
                ))}
              </>
            )}
          </div>
        )}

        {tab==="stats"&&(
          <div style={R.page}>
            <div style={R.header}>
              <div><div style={R.headerSub}>Statistiche</div><div style={R.headerTitle}>{MONTHS[CM]} {CY}</div></div>
            </div>
            <div style={R.statsCard}>
              <div style={R.sectionTitle2}>Distribuzione spese</div>
              {byCat.length===0?<Empty msg="Nessun dato"/>:(
                <div>
                  {byCat.map(c=>(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                      <div style={{...R.catIcon,background:c.color+"22",color:c.color}}>{c.icon}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{fontSize:13,color:"#d0d0e8"}}>{c.name}</span>
                          <span style={{fontSize:13,fontWeight:700,color:c.color}}>{fmt(c.total)}</span>
                        </div>
                        <div style={R.barBg}><div style={{...R.barFill,width:`${(c.total/totalMonth)*100}%`,background:c.color}}/></div>
                      </div>
                      <div style={{fontSize:11,color:"#555",width:36,textAlign:"right"}}>{((c.total/totalMonth)*100).toFixed(0)}%</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={R.statsCard}>
              <div style={R.sectionTitle2}>Riepilogo</div>
              {[
                ["Totale mese",fmt(totalMonth),"#e0e0ee"],
                ["Abbonamenti",fmt(monthExps.filter(e=>e.rid).reduce((s,e)=>s+e.amount,0)),"#5B8BF5"],
                ["Bollette",fmt(monthExps.filter(e=>e.bid).reduce((s,e)=>s+e.amount,0)),"#F5A623"],
                ["Spese variabili",fmt(monthExps.filter(e=>!e.rid&&!e.bid).reduce((s,e)=>s+e.amount,0)),"#2FC9A0"],
              ].map(([l,v,col])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #1a1a2c"}}>
                  <span style={{fontSize:13,color:"#888"}}>{l}</span>
                  <span style={{fontSize:15,fontWeight:700,color:col}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={R.statsCard}>
              <div style={R.sectionTitle2}>Come hai pagato</div>
              {PAYMENT_METHODS.map(pm=>{
                const tot=monthExps.filter(e=>e.pay===pm.id).reduce((s,e)=>s+e.amount,0);
                const count=monthExps.filter(e=>e.pay===pm.id).length;
                if(!count)return null;
                const col=pm.id==="card"?"#5B8BF5":pm.id==="cash"?"#2FC9A0":"#A07DF6";
                return (
                  <div key={pm.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                    <div style={{width:38,height:38,borderRadius:10,background:"#1a1a2c",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{pm.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:13,color:"#d0d0e8"}}>{pm.label}</span>
                        <span style={{fontSize:13,fontWeight:700,color:"#e0e0ee"}}>{fmt(tot)}</span>
                      </div>
                      <div style={R.barBg}><div style={{...R.barFill,width:`${(tot/totalMonth)*100}%`,background:col}}/></div>
                    </div>
                    <div style={{fontSize:11,color:"#555",width:46,textAlign:"right"}}>{count} spese</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="settings"&&(
          <div style={R.page}>
            <div style={R.header}>
              <div><div style={R.headerSub}>Impostazioni</div><div style={R.headerTitle}>Gestione</div></div>
            </div>
            <div style={R.sectionTitle}>Le tue categorie</div>
            {cats.map(c=>(
              <div key={c.id} style={R.settingRow}>
                <div style={{...R.catIcon,background:c.color+"22",color:c.color,flexShrink:0}}>{c.icon}</div>
                <div style={{flex:1,fontSize:14,color:"#d0d0e8"}}>{c.name}</div>
                <button className="icon-btn sm" onClick={()=>setSheet({type:"cat",data:c})}>✏️</button>
                <button className="icon-btn sm del" onClick={()=>delCat(c.id)}>🗑️</button>
              </div>
            ))}
            <button className="outline-btn" style={{marginTop:10,width:"100%"}} onClick={()=>setSheet({type:"cat"})}>＋ Nuova categoria</button>
            <div style={{...R.sectionTitle,marginTop:28}}>🔄 Abbonamenti</div>
            {recur.map(r=>{
              const c=cat(r.catId);
              return (
                <div key={r.id} style={R.settingRow}>
                  <div style={{...R.catIcon,background:c.color+"22",color:c.color,flexShrink:0}}>{c.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,color:"#d0d0e8"}}>{r.name}</div>
                    <div style={{fontSize:11,color:"#555"}}>Ogni {r.day}° del mese · {fmt(r.amount)}</div>
                  </div>
                  <button className="icon-btn sm" onClick={()=>setSheet({type:"recur",data:r})}>✏️</button>
                  <button className="icon-btn sm del" onClick={()=>delRecur(r.id)}>🗑️</button>
                </div>
              );
            })}
            <button className="outline-btn" style={{marginTop:10,width:"100%"}} onClick={()=>setSheet({type:"recur"})}>＋ Nuovo abbonamento</button>
            <div style={{...R.sectionTitle,marginTop:28}}>🧾 Bollette</div>
            {bills.map(b=>{
              const c=cat(b.catId);
              return (
                <div key={b.id} style={R.settingRow}>
                  <div style={{...R.catIcon,background:c.color+"22",color:c.color,flexShrink:0}}>{c.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,color:"#d0d0e8"}}>{b.name}</div>
                    <div style={{fontSize:11,color:"#555"}}>Ogni {b.day}° del mese · importo variabile</div>
                  </div>
                  <button className="icon-btn sm" onClick={()=>setSheet({type:"bill",data:b})}>✏️</button>
                  <button className="icon-btn sm del" onClick={()=>delBill(b.id)}>🗑️</button>
                </div>
              );
            })}
            <button className="outline-btn" style={{marginTop:10,width:"100%"}} onClick={()=>setSheet({type:"bill"})}>＋ Nuova bolletta</button>
          </div>
        )}

      </div>

      <nav style={R.bottomNav}>
        {[["home","🏠","Home"],["expenses","📋","Spese"],["stats","📊","Statistiche"],["settings","⚙️","Gestione"]].map(([t,icon,label])=>(
          <button key={t} className="tab-btn" style={R.tabBtn} onClick={()=>setTab(t)}>
            <span style={{fontSize:20}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:tab===t?700:400,color:tab===t?"#5B8BF5":"#555"}}>{label}</span>
          </button>
        ))}
      </nav>

      {sheet&&(
        <div style={R.overlay} onClick={()=>setSheet(null)}>
          <div style={R.sheetBox} onClick={e=>e.stopPropagation()}>
            <div style={R.sheetHandle}/>
            {sheet.type==="exp"&&<ExpForm cats={cats} data={sheet.data} onSave={saveExp} onClose={()=>setSheet(null)}/>}
            {sheet.type==="recur"&&<RecurForm cats={cats} data={sheet.data} onSave={saveRecur} onClose={()=>setSheet(null)}/>}
            {sheet.type==="bill"&&<BillForm cats={cats} data={sheet.data} onSave={saveBill} onClose={()=>setSheet(null)}/>}
            {sheet.type==="cat"&&<CatForm data={sheet.data} onSave={saveCat} onClose={()=>setSheet(null)}/>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
