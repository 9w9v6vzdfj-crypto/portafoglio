<script>
// ── FIREBASE REST ─────────────────────────────────────────────────────────────
const FB_PROJECT="moi-dom-9e132";
const FB_API_KEY="AIzaSyAKA3Pai7x0CgPkd6AF_5OUa1DWEIv8IV8";
const FB_BASE=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

function toFS(obj){
  function cv(v){
    if(v===null||v===undefined)return{nullValue:null};
    if(typeof v==="boolean")return{booleanValue:v};
    if(typeof v==="number")return{doubleValue:v};
    if(typeof v==="string")return{stringValue:v};
    if(Array.isArray(v))return{arrayValue:{values:v.length?v.map(cv):[]}};
    if(typeof v==="object"){const f={};Object.entries(v).forEach(([k,x])=>{f[k]=cv(x)});return{mapValue:{fields:f}}}
    return{stringValue:String(v)};
  }
  const f={};Object.entries(obj).forEach(([k,v])=>{f[k]=cv(v)});return{fields:f};
}
function fromFS(fields){
  function pv(v){
    if(!v)return null;
    if(v.nullValue!==undefined)return null;
    if(v.booleanValue!==undefined)return v.booleanValue;
    if(v.doubleValue!==undefined)return v.doubleValue;
    if(v.integerValue!==undefined)return+v.integerValue;
    if(v.stringValue!==undefined)return v.stringValue;
    if(v.arrayValue)return(v.arrayValue.values||[]).map(pv);
    if(v.mapValue){const o={};Object.entries(v.mapValue.fields||{}).forEach(([k,x])=>{o[k]=pv(x)});return o}
    return null;
  }
  const o={};Object.entries(fields||{}).forEach(([k,v])=>{o[k]=pv(v)});return o;
}
async function fbGet(path){
  try{
    const r=await fetch(`${FB_BASE}/${path}?key=${FB_API_KEY}`);
    if(r.ok){const j=await r.json();return fromFS(j.fields);}
    if(r.status===404)return null;
  }catch{}return null;
}
async function fbSet(path,data){
  try{
    // Build updateMask so each field is fully REPLACED (not merged).
    // Without this, Firestore PATCH merges arrays and leaves residue from deleted items.
    const mask=Object.keys(data).map(k=>"updateMask.fieldPaths="+encodeURIComponent(k)).join("&");
    const r=await fetch(`${FB_BASE}/${path}?key=${FB_API_KEY}&${mask}`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(toFS(data))
    });
    return r.ok;
  }catch{return false;}
}

const LOCAL={
  get(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

// ── ACCOUNTS ──────────────────────────────────────────────────────────────────
const ACCOUNTS={
  liya:    {name:"Liya",    pass:"Chanel01!", role:"estetista", appName:"💅 MOI DOM",  color:"#c47a9e"},
  valeria: {name:"Valeria", pass:"Cleria",    role:"parrucchiera", appName:"✂️ Cleria", color:"#7a9ec4"},
  clara:   {name:"Clara",   pass:"Cleria",    role:"parrucchiera", appName:"✂️ Cleria", color:"#9ec47a"},
  marieClaire:{name:"Marie Claire",pass:"Cleria",role:"parrucchiera",appName:"✂️ Cleria",color:"#c4a47a"},

// Column order per user: own column first, then others
const PERSON_ORDER={
  liya:       ["liya","valeria","clara","marieClaire"],

  clara:      ["clara","valeria","marieClaire","liya"],

const PEOPLE=["liya","valeria","clara","marieClaire"];
const PEOPLE_NAMES={liya:"Liya",valeria:"Valeria",clara:"Clara",marieClaire:"M.Claire"};
const PEOPLE_COLORS={liya:"#c47a9e",valeria:"#7a9ec4",clara:"#9ec47a",marieClaire:"#c4a47a"};

// ── DEFAULTS ──────────────────────────────────────────────────────────────────
const DEFAULT_SERVICES_LIYA=[
  {id:"sl1",name:"Manicure",duration:60,price:25,owner:"liya"},
  {id:"sl2",name:"Pedicure",duration:75,price:35,owner:"liya"},
  {id:"sl3",name:"Semipermanente",duration:90,price:40,owner:"liya"},
  {id:"sl4",name:"Trattamento viso",duration:60,price:50,owner:"liya"},
  {id:"sl5",name:"Ceretta gambe",duration:45,price:30,owner:"liya"},
  {id:"sl6",name:"Ceretta ascelle",duration:20,price:12,owner:"liya"},
  {id:"sl7",name:"Sopracciglia",duration:20,price:10,owner:"liya"},
  {id:"sl8",name:"Trucco",duration:60,price:60,owner:"liya"},
];

  {id:"sp2",name:"Taglio uomo",duration:30,price:0,owner:"parrucchiera"},
  {id:"sp3",name:"Piega",duration:45,price:0,owner:"parrucchiera"},

// ── HELPERS ───────────────────────────────────────────────────────────────────
const DAYS=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
const MONTHS=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
function toKey(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${dd}`;}
function uid(){return"_"+Math.random().toString(36).slice(2,9);}
function timeToMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function minToTime(m){return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");}

  if(id==="jolly") return {name:"⚡ Jolly",phone:"",email:""};
  return state.clients.find(c=>c.id===id);

function serviceById(id){return state.services.find(s=>s.id===id);}

function canEditService(svc){

}

function italianHolidays(year){
  const fixed=[`${year}-01-01`,`${year}-01-06`,`${year}-04-25`,`${year}-05-01`,`${year}-06-02`,
    `${year}-08-15`,`${year}-11-01`,`${year}-12-08`,`${year}-12-25`,`${year}-12-26`];
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const mm=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*mm+114)/31),dy=((h+l-7*mm+114)%31)+1;
  const easter=new Date(year,mo-1,dy),easterMon=new Date(easter);easterMon.setDate(easter.getDate()+1);
  fixed.push(toKey(easter),toKey(easterMon));return new Set(fixed);
}
function dayStatus(key){
  const d=new Date(key+"T12:00:00"),dow=d.getDay();
  if(italianHolidays(d.getFullYear()).has(key))return"holiday";
  if(dow===0||dow===1)return"dayoff";
  return null;
}

function updateOnlineIndicator(){

async function saveAll(){
  const stamp=new Date().toISOString();
  const data={
    appointments:state.appointments,
    clients:state.clients,
    services:state.services,
    blocks:state.blocks,
    updatedAt:stamp
  };
  // Mark this as our own write so the realtime sync doesn't reload an older
  // cached copy on top of what we just changed (e.g. a just-deleted appointment).
  lastUpdatedAt=stamp;
  // Always save to localStorage immediately
  LOCAL.set("ba_appointments",state.appointments);
  LOCAL.set("ba_clients",state.clients);
  LOCAL.set("ba_services",state.services);
  LOCAL.set("ba_blocks",state.blocks);
  LOCAL.set("ba_updatedAt",stamp);
  // Try Firebase
  if(!isOnline){pendingSave=true;return;}
  const ok=await fbSet("moidom/data",data);
  if(!ok){pendingSave=true;}
}
async function loadAll(){
  const d=await fbGet("moidom/data");
  if(d){
    state.appointments=d.appointments||[];
    state.clients=d.clients||[];
    state.services=d.services||[...DEFAULT_SERVICES];
    state.blocks=d.blocks||[];
    lastUpdatedAt=d.updatedAt||"";
  }else{
    state.appointments=LOCAL.get("ba_appointments",[]);
    state.clients=LOCAL.get("ba_clients",[]);
    state.services=LOCAL.get("ba_services",[...DEFAULT_SERVICES]);
    state.blocks=LOCAL.get("ba_blocks",[]);
  }
}

function el(tag,props={},...children){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="class")e.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{if(c!=null)e.appendChild(typeof c==="string"?document.createTextNode(c):c)});
  return e;
}
function txt(t){return document.createTextNode(t);}
function fld(label,tag,attrs={},children=[]){
  const d=el("div",{class:"field"});d.appendChild(el("label",{},label));
  d.appendChild(el(tag,attrs,...children));return d;
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function getMonthCells(year,month){
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  let dow=(first.getDay()+6)%7;const cells=[];
  for(let i=dow-1;i>=0;i--){const d=new Date(year,month,0-i);cells.push({date:d,cur:false});}
  for(let d=1;d<=last.getDate();d++)cells.push({date:new Date(year,month,d),cur:true});
  while(cells.length%7!==0){const p=cells[cells.length-1].date,n=new Date(p);n.setDate(p.getDate()+1);cells.push({date:n,cur:false});}
  return cells;
}

      const key=toKey(date),dayA=apptsByDay[key]||[],cnt=dayA.length;
      const status=cur?dayStatus(key):null;
      let cls="day-cell";
      if(!cur)cls+=" other-month";

// ── DAY COLUMNS VIEW ──────────────────────────────────────────────────────────
function renderDayColumns(){
  const START=8*60, END=20*60, SLOT=30;
  const slots=[];
  for(let m=START;m<END;m+=SLOT)slots.push(m);

  const order=PERSON_ORDER[state.user]||PEOPLE;
  const dayAppts=state.appointments.filter(a=>a.date===state.selectedDay);
  const dayBlocks=state.blocks.filter(b=>b.date===state.selectedDay);

  const container=el("div",{class:"columns-container"});

  // Time column
  const timeCol=el("div",{class:"time-col"});
  timeCol.appendChild(el("div",{class:"time-col-header"},""));
  slots.forEach(m=>{
    timeCol.appendChild(el("div",{class:"time-slot-label"},minToTime(m)));
  });
  container.appendChild(timeCol);

  // Person columns
  order.forEach(personId=>{
    const acc=ACCOUNTS[personId];
    const col=el("div",{class:"person-col"});

    // Header — name + quick add button (works even over existing appointments)
    const hdr=el("div",{class:"person-col-header",style:{borderBottom:"2px solid "+acc.color,display:"flex",alignItems:"center",justifyContent:"center",gap:"3px"}},
      el("span",{style:{color:acc.color}},PEOPLE_NAMES[personId]),
      el("span",{style:{background:acc.color,color:"#fff",borderRadius:"50%",width:"16px",height:"16px",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:".7rem",fontWeight:700,cursor:"pointer",flexShrink:0,lineHeight:1},
        onClick:(ev)=>{ev.stopPropagation();state.modal={type:"appt",data:{id:null,clientId:"",serviceId:"",personId,date:state.selectedDay,time:"09:00",notes:"",payment:"carta",customPrice:null}};render();}},"+")
    );
    col.appendChild(hdr);

    // Body
    const body=el("div",{class:"person-col-body"});
    const bodyHeight=slots.length*48;
    body.style.height=bodyHeight+"px";
    body.style.position="relative";

    // Draw slot rows — all users can add appointments on any column
    slots.forEach((m,i)=>{
      const row=el("div",{class:"time-row",style:{top:(i*48)+"px",position:"absolute",left:0,right:0,height:"48px"}});
      const addBtn=el("div",{class:"add-slot-btn",onClick:()=>{
        state.modal={type:"appt",data:{id:null,clientId:"",serviceId:"",personId,date:state.selectedDay,time:minToTime(m),notes:"",payment:"carta",customPrice:null}};render();
      }},"+");
      row.appendChild(addBtn);
      body.appendChild(row);
    });

    // Draw blocks (red) — clamp to grid so they never escape or become unclickable
    dayBlocks.filter(b=>b.personId===personId).forEach(b=>{
      let top=((b.startMin-START)/SLOT)*48;
      let height=((b.endMin-b.startMin)/SLOT)*48;
      // Clamp into the visible grid area
      if(top<0){ height+=top; top=0; }
      if(top>bodyHeight) return;
      if(top+height>bodyHeight) height=bodyHeight-top;
      if(height<18) height=18;
      const block=el("div",{class:"avail-block avail-blocked",style:{top:top+"px",height:height+"px"}});
      block.appendChild(el("div",{style:{fontSize:".62rem",color:"#c62828",fontWeight:700,padding:"2px 4px",overflow:"hidden"}},"🔴 "+(b.note||"Non disponibile")));
      if(b.personId===state.user||state.user==="admin"){
        block.style.cursor="pointer";
        block.addEventListener("click",(ev)=>{
          ev.stopPropagation();
          state.modal={type:"blockDetail",data:b};render();
        });
      }
      body.appendChild(block);
    });

    // Draw appointments (purple). When several overlap, clicking opens a chooser.
    const personAppts=dayAppts.filter(a=>a.personId===personId)
      .map(a=>{
        const svc=serviceById(a.serviceId);
        const startMin=timeToMin(a.time);
        const endMin=startMin+(svc?.duration||60);
        return {a,svc,startMin,endMin};
      })
      .sort((x,y)=>x.startMin-y.startMin);

    personAppts.forEach(({a,svc,startMin,endMin},idx)=>{
      const client=clientById(a.clientId);
      const top=((startMin-START)/SLOT)*48;
      const height=((endMin-startMin)/SLOT)*48;
      if(top<0)return;
      // Find all appointments that overlap this one (including itself)
      const overlapping=personAppts.filter(o=>startMin<o.endMin && endMin>o.startMin);
      const hasOverlap=overlapping.length>1;
      // Position of this appt within its overlap group (for a visible "stacked" offset)
      const posInGroup=overlapping.findIndex(o=>o.a===a);
      const offset=hasOverlap?posInGroup*6:0; // shift each stacked card by 6px
      const apptEl=el("div",{class:"appt-block",style:{
        top:top+"px",height:Math.max(height-2,20)+"px",
        left:(2+offset)+"px",
        right:(2)+"px",
        background:acc.color,
        border:hasOverlap?"1.5px solid #fff":"none",
        zIndex:String(2+posInGroup)
      },onClick:()=>{
        if(hasOverlap){
          state.modal={type:"apptChooser",data:{appts:overlapping.map(o=>o.a),personId}};render();
        }else{
          state.modal={type:"apptDetail",data:a};render();
        }
      }});
      // Badge with count of overlapping appointments
      if(hasOverlap){
        apptEl.appendChild(el("div",{style:{position:"absolute",top:"1px",right:"1px",background:"#fff",color:acc.color,borderRadius:"50%",width:"16px",height:"16px",fontSize:".62rem",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 3px rgba(0,0,0,.25)",zIndex:"10"}},String(overlapping.length)));
      }
      apptEl.appendChild(el("div",{class:"appt-block-name"},client?.name||"—"));
      apptEl.appendChild(el("div",{class:"appt-block-svc"},svc?.name||"—"));
      apptEl.appendChild(el("div",{style:{fontSize:".58rem",opacity:.75,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},a.time+" → "+minToTime(endMin)));
      body.appendChild(apptEl);
    });

    // Block button — own column for everyone, all columns for admin
    const canBlock=personId===state.user||state.user==="admin";
    if(canBlock){
      const blockBtn=el("div",{style:{position:"absolute",bottom:4,left:2,right:2,height:20,background:"rgba(229,115,115,.15)",border:"1px dashed #e57373",borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:".62rem",color:"#e57373",fontWeight:600,zIndex:3},
        onClick:()=>{state.modal={type:"block",data:{personId,date:state.selectedDay}};render();}},"🔴 Blocca orario");
      body.appendChild(blockBtn);
    }

    col.appendChild(body);
    container.appendChild(col);
  });

  return el("div",{style:{overflowX:"auto",borderRadius:"1rem",border:"1.5px solid #f0dce8",marginBottom:"1rem"}},container);
}

          const newClient={id:uid(),name:newName.trim(),phone:"",email:"",birthday:"",notes:"",createdAt:toKey(new Date())};
          state.clients.push(newClient);
          state.appointments=state.appointments.map(x=>x.id===a.id?{...x,clientId:newClient.id}:x);
          saveAll();state.modal=null;render();
        }},"✏️ Identifica"):txt("")
    ),
    el("div",{style:{fontSize:".88rem",color:"var(--muted)",marginBottom:".3rem"}},"👤 "+(p?.name||"—")+" · "+(s?.name||"—")+" · "+(s?.duration||"?")+"min"),
    showPrice?el("div",{style:{fontSize:".88rem",color:"var(--muted)",marginBottom:".3rem"}},"💰 €"+price+" · "+(a.payment==="carta"?"💳 Carta":a.payment==="contanti"?"💵 Contanti":"⏳ Da pagare")):txt(""),
    a.notes?el("div",{style:{fontSize:".83rem",fontStyle:"italic",color:"#9b6b8a"}},"📝 "+a.notes):txt("")
  ));

  // All users can edit payment for appointments in their group
  if(showPayEdit){
    const pmRow=el("div",{style:{display:"flex",gap:".4rem",marginBottom:".75rem"}});
    [["contanti","💵 Contanti","#6abf69"],["carta","💳 Carta","#5b8dd9"],["da_pagare","⏳ Da pagare","#e0a030"]].forEach(([v,l,col])=>{
      const active=(a.payment||"carta")===v;
      pmRow.appendChild(el("button",{style:{flex:1,border:"2px solid "+(active?col:"#e0c8d8"),borderRadius:"2rem",padding:".38rem .3rem",fontSize:".78rem",fontWeight:700,cursor:"pointer",background:active?col+"22":"transparent",color:active?col:"#9b6b8a"},
        onClick:()=>{state.appointments=state.appointments.map(x=>x.id===a.id?{...x,payment:v}:x);saveAll();state.modal=null;render();}},l));
    });
    wrap.appendChild(pmRow);
  }
  wrap.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn btn-secondary btn-md",onClick:()=>{state.modal={type:"appt",data:{...a}};render();}},"✏️ Modifica"),
    el("button",{class:"btn btn-danger btn-md",onClick:()=>{
      if(confirm("Eliminare questo appuntamento?")){state.appointments=state.appointments.filter(x=>x.id!==a.id);saveAll();state.modal=null;render();}
    }},"🗑 Elimina"),
    el("button",{class:"btn btn-secondary btn-md",onClick:()=>{
      if(a.clientId==="jolly"){alert("Il cliente Jolly non ha un numero di telefono. Identificalo prima!");return;}
      const df=new Date(a.date+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
      const firstName=c?.name?.split(" ")[0]||"";
      const msg=encodeURIComponent("Ciao "+firstName+"! Ti ricordo il tuo appuntamento per "+(s?.name||"")+" "+df+" alle "+a.time+". A presto! 💅");
      const phone=(c?.phone||"").replace(/\s/g,"");
      if(!phone){alert("Nessun numero di telefono per questa cliente.");return;}
      window.open("sms:"+phone+"?&body="+msg);
    }},"💬 SMS")
  ));
  return wrap;
}

// ── APPOINTMENT FORM ──────────────────────────────────────────────────────────
function renderApptForm(d){
  const wrap=el("div",{});

  // Person selector
  const personSel=el("select",{});
  PEOPLE.forEach(pid=>{
    const o=el("option",{value:pid},ACCOUNTS[pid].name);
    if(pid===(d.personId||state.user))o.selected=true;
    personSel.appendChild(o);
  });
  wrap.appendChild(el("div",{class:"field"},el("label",{},"Per chi"),personSel));

  // Client selector with Jolly option
  const clientSel=el("select",{});
  clientSel.appendChild(el("option",{value:""},"— Seleziona cliente —"));
  clientSel.appendChild(el("option",{value:"jolly"},"⚡ Jolly (cliente da identificare)"));
  state.clients.slice().sort((a,b)=>a.name.localeCompare(b.name,"it")).forEach(c=>{
    const o=el("option",{value:c.id},c.name);if(c.id===d.clientId)o.selected=true;clientSel.appendChild(o);
  });
  if(d.clientId==="jolly"){const o=clientSel.querySelector('option[value="jolly"]');if(o)o.selected=true;}
  wrap.appendChild(el("div",{class:"field"},el("label",{},"Cliente"),clientSel));

  // Service selector (filtered by person)
  const svcSel=el("select",{});
  svcSel.appendChild(el("option",{value:""},"— Seleziona servizio —"));
  const infoBox=el("div",{});
  const priceInput=el("input",{type:"number",min:"0",step:"0.5"});
  priceInput.value=d.customPrice!=null?d.customPrice:(d.serviceId?(serviceById(d.serviceId)?.price||""):"");

  function populateServices(){
    svcSel.innerHTML="";svcSel.appendChild(el("option",{value:""},"— Seleziona servizio —"));
    const pid=personSel.value;
    // Services for this person: liya's own, or parrucchiera shared services
    const ownerKey=pid==="liya"?"liya":"parrucchiera";
    state.services.filter(s=>s.owner===ownerKey).slice().sort((a,b)=>a.name.localeCompare(b.name,"it")).forEach(s=>{
      const o=el("option",{value:s.id},s.name+" ("+s.duration+"min)");
      if(s.id===d.serviceId)o.selected=true;svcSel.appendChild(o);
    });
    updateInfo();
  }
  function updateInfo(){
    infoBox.innerHTML="";
    const s=state.services.find(x=>x.id===svcSel.value);
    if(s){
      const showP=state.user==="admin"||s.owner===state.user;
      infoBox.appendChild(el("div",{class:"info-box"},"⏱ "+s.duration+" min"+(showP?" | €"+s.price:"")));
      priceInput.value=s.price;
    }
  }
  personSel.addEventListener("change",()=>{ populateServices(); buildPriceSection(); });
  svcSel.addEventListener("change",updateInfo);
  wrap.appendChild(el("div",{class:"field"},el("label",{},"Servizio"),svcSel));
  wrap.appendChild(infoBox);
  populateServices();

  // Price & payment — show for own appointments or admin
  // Re-evaluate when person changes
  const priceSection=el("div",{});
  function buildPriceSection(){
    priceSection.innerHTML="";
    const pid=personSel.value;
    const showP=state.user==="admin"||pid===state.user;
    if(showP){
      const paymentSel=el("select",{});
      [["carta","💳 Carta"],["contanti","💵 Contanti"],["da_pagare","⏳ Da pagare"]].forEach(([v,l])=>{
        const o=el("option",{value:v},l);if(v===(d.payment||"carta"))o.selected=true;paymentSel.appendChild(o);
      });
      const pg=el("div",{class:"grid2"});
      pg.appendChild(el("div",{class:"field"},el("label",{},"Prezzo (€)"),priceInput));
      pg.appendChild(el("div",{class:"field"},el("label",{},"Pagamento"),paymentSel));
      priceSection.appendChild(pg);
      wrap._paymentSel=paymentSel;
    } else {
      wrap._paymentSel=null;
    }
  }
  personSel.addEventListener("change",()=>{ populateServices(); buildPriceSection(); });
  wrap.appendChild(priceSection);
  buildPriceSection();

  const dateInput=el("input",{type:"date",value:d.date||""});
  const timeInput=el("input",{type:"time",value:d.time||"09:00"});
  const g=el("div",{class:"grid2"});
  g.appendChild(el("div",{class:"field"},el("label",{},"Data"),dateInput));
  g.appendChild(el("div",{class:"field"},el("label",{},"Orario"),timeInput));
  wrap.appendChild(g);

  const notesInput=el("textarea",{rows:2,placeholder:"Opzionale…"});notesInput.value=d.notes||"";
  wrap.appendChild(el("div",{class:"field"},el("label",{},"Note"),notesInput));

  wrap.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn btn-secondary btn-md",onClick:()=>{state.modal=null;render();}},"Annulla"),
    el("button",{class:"btn btn-primary btn-md",onClick:()=>{
      const personId=personSel.value;
      const clientId=clientSel.value;
      const serviceId=svcSel.value;
      const date=dateInput.value,time=timeInput.value,notes=notesInput.value;
      const customPrice=priceInput.value!==""?+priceInput.value:null;
      const payment=wrap._paymentSel?wrap._paymentSel.value:"carta";
      if(!clientId||!serviceId||!date||!time){alert("Compila tutti i campi obbligatori.");return;}
      // time range warning
      const tMin=timeToMin(time);
      if(tMin<8*60||tMin>=20*60){if(!confirm("⚠️ Orario fuori range!\n\nL'orario "+time+" è fuori dall'orario di lavoro (08:00-20:00).\n\nVuoi aggiungerlo comunque?"))return;}
      // past warning
      if(!d.id){const dt=new Date(date+"T"+time);if(dt<new Date()){if(!confirm("⚠️ Data nel passato! Aggiungere comunque?"))return;}}
      // holiday warning
      if(!d.id){const st=dayStatus(date);if(st==="holiday"){if(!confirm("🎉 Giorno festivo! Sei sicura?"))return;}else if(st==="dayoff"){const dw=new Date(date+"T12:00:00").getDay();if(!confirm("😴 "+(dw===0?"Domenica":"Lunedì")+" non lavorativo. Sei sicura?"))return;}}
      // overlap check — warn but allow confirmation
      const ns=serviceById(serviceId);
      const nst=timeToMin(time);
      const ned=nst+Math.max(ns?.duration||60, 1);
      const conf=state.appointments.find(a=>{
        if(!a.personId||!personId)return false;
        if(a.date!==date)return false;
        if(a.personId!==personId)return false;
        if(d.id&&a.id===d.id)return false;
        const as2=serviceById(a.serviceId);
        const ast=timeToMin(a.time);
        const aed=ast+Math.max(as2?.duration||60, 1);
        return nst<aed&&ned>ast;
      });
      if(conf){
        const cc=clientById(conf.clientId);
        const confEndMin=timeToMin(conf.time)+Math.max(serviceById(conf.serviceId)?.duration||60,1);
        const ok=confirm("⚠️ Sovrapposizione!\n\n"+ACCOUNTS[personId]?.name+" ha già un appuntamento con "+(cc?.name||"cliente")+" dalle "+conf.time+" alle "+minToTime(confEndMin)+".\n\nVuoi aggiungerlo comunque?");
        if(!ok)return;
      }
      const saved={id:d.id||uid(),personId,clientId,serviceId,date,time,notes,customPrice,payment};
      if(d.id)state.appointments=state.appointments.map(a=>a.id===d.id?saved:a);
      else state.appointments.push(saved);
      saveAll();state.modal=null;render();
    }},"Salva")
  ));
  return wrap;
}

// ── BLOCK FORM ────────────────────────────────────────────────────────────────
function renderBlockForm(d){
  const isEdit=!!d.id;
  const wrap=el("div",{});
  wrap.appendChild(el("div",{style:{fontSize:".88rem",color:"var(--muted)",marginBottom:"1rem"}},(isEdit?"Modifica blocco per ":"Blocca un orario per ")+ACCOUNTS[d.personId].name+" il "+d.date));
  const startIn=el("input",{type:"time",value:isEdit?minToTime(d.startMin):"09:00",min:"08:00",max:"20:00"});
  const endIn=el("input",{type:"time",value:isEdit?minToTime(d.endMin):"10:00",min:"08:00",max:"20:00"});
  const noteIn=el("input",{type:"text",placeholder:"Motivo (opzionale)…",value:d.note||""});
  const g=el("div",{class:"grid2"});
  g.appendChild(el("div",{class:"field"},el("label",{},"Dalle"),startIn));
  g.appendChild(el("div",{class:"field"},el("label",{},"Alle"),endIn));
  wrap.appendChild(g);
  wrap.appendChild(el("div",{class:"field"},el("label",{},"Motivo"),noteIn));
  wrap.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn btn-secondary btn-md",onClick:()=>{state.modal=null;render();}},"Annulla"),
    el("button",{class:"btn btn-danger btn-md",onClick:()=>{
      let startMin=timeToMin(startIn.value),endMin=timeToMin(endIn.value);
      if(endMin<=startMin){alert("L'orario di fine deve essere dopo quello di inizio.");return;}
      // Clamp to working hours 08:00-20:00 so blocks never render outside the grid
      if(startMin<8*60||endMin>20*60){
        if(!confirm("⚠️ L'orario è fuori dalla fascia 08:00-20:00.\n\nVerrà adattato automaticamente. Continuare?"))return;
        startMin=Math.max(startMin,8*60);
        endMin=Math.min(endMin,20*60);
        if(endMin<=startMin){alert("Orario non valido dopo l'adattamento.");return;}
      }
      // Check if there's already an appointment in this slot
      const conflict=state.appointments.find(a=>{
        if(a.date!==d.date||a.personId!==d.personId)return false;
        const svc=serviceById(a.serviceId);
        const ast=timeToMin(a.time),aed=ast+(svc?.duration||60);
        return startMin<aed&&endMin>ast;
      });
      if(conflict){
        const cc=clientById(conflict.clientId);
        if(!confirm("⚠️ Attenzione!\n\nC'è già un appuntamento con "+(cc?.name||"una cliente")+" alle "+conflict.time+" in questo orario.\n\nVuoi bloccare comunque?"))return;
      }
      if(isEdit){
        state.blocks=state.blocks.map(x=>x.id===d.id?{...x,startMin,endMin,note:noteIn.value}:x);
      }else{
        state.blocks.push({id:uid(),personId:d.personId,date:d.date,startMin,endMin,note:noteIn.value});
      }
      saveAll();state.modal=null;render();
    }},isEdit?"✓ Salva":"🔴 Blocca")
  ));
  return wrap;
}

// ── REALTIME SYNC ─────────────────────────────────────────────────────────────
let userIsTyping=false;
document.addEventListener("focusin", e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")
    userIsTyping=true;
});
document.addEventListener("focusout",()=>{ setTimeout(()=>userIsTyping=false, 300); });

async function syncFromFirebase(){
  if(!state.user) return;
  if(state.modal) return;     // modal open — don't disturb
  if(userIsTyping) return;    // user is typing — don't disturb
  try{
    const r=await fetch(`${FB_BASE}/moidom/data?key=${FB_API_KEY}`);
    if(!r.ok) return;
    const j=await r.json();
    const d=fromFS(j.fields);
    if(d.updatedAt && d.updatedAt===lastUpdatedAt) return; // nothing changed
    lastUpdatedAt=d.updatedAt||"";
    state.appointments=d.appointments||[];
    state.clients=d.clients||[];
    state.services=d.services||[...DEFAULT_SERVICES];
    state.blocks=d.blocks||[];
    render();
    showSyncToast(); // notify that data was refreshed from cloud
  }catch{}
}

function showSyncToast(){
  let t=document.getElementById("sync-toast");
  if(!t){
    t=el("div",{id:"sync-toast",style:{
      position:"fixed",top:"calc(var(--safe-top) + .5rem)",left:"50%",transform:"translateX(-50%)",
      background:"rgba(61,26,46,.92)",color:"#f7dcea",padding:".4rem 1rem",borderRadius:"2rem",
      fontSize:".78rem",fontWeight:600,zIndex:"500",boxShadow:"0 4px 16px rgba(0,0,0,.25)",
      opacity:"0",transition:"opacity .3s",pointerEvents:"none"
    }},"🔄 Aggiornato dal cloud");
    document.body.appendChild(t);
  }
  t.style.opacity="1";
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity="0";},2000);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded",async()=>{
  await loadAll();
  document.getElementById("loader").style.display="none";
  const savedUser=LOCAL.get("ba_session",null);
  if(savedUser&&ACCOUNTS[savedUser]){
    state.user=savedUser;
    document.getElementById("app").style.display="flex";
    render();
  }else{
    renderLogin();
  }
  // Start realtime sync every 15 seconds
  setInterval(syncFromFirebase, 15000);
});
</script>
